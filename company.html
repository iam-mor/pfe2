<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Dashboard · Internship Platform</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #EEF2F6 0%, #E6ECF3 40%, #F4F7FB 100%);
            background-size: 200% 200%;
            animation: gradientShift 20s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
            color: #0F172A;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .blob {
            position: fixed;
            width: 600px;
            height: 600px;
            border-radius: 50%;
            filter: blur(70px);
            opacity: 0.18;
            pointer-events: none;
            animation: floatBlob 18s infinite ease-in-out;
            z-index: 0;
        }
        .blob-1 { background: radial-gradient(circle, rgba(16,185,129,0.5) 0%, rgba(16,185,129,0) 70%); top: -200px; right: -150px; }
        .blob-2 { background: radial-gradient(circle, rgba(59,130,246,0.4) 0%, rgba(59,130,246,0) 70%); bottom: -200px; left: -150px; animation-delay: -9s; }

        @keyframes floatBlob {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 35px) scale(0.95); }
        }

        .header {
            position: fixed;
            top: 20px;
            left: 20px;
            right: 20px;
            height: 70px;
            background: rgba(244, 247, 251, 0.8);
            backdrop-filter: blur(14px);
            border-radius: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 28px;
            z-index: 100;
            border: 1px solid rgba(16, 185, 129, 0.25);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            animation: pulseGlow 4s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03); border-color: rgba(16, 185, 129, 0.25); }
            50% { box-shadow: 0 8px 30px rgba(16, 185, 129, 0.35); border-color: rgba(16, 185, 129, 0.5); }
        }

        .logo { display: flex; align-items: center; gap: 8px; cursor: pointer; text-decoration: none; }
        .logo:hover { opacity: 0.85; }
        .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #10b981, #3b82f6); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .logo-icon i { color: white; font-size: 14px; }
        .logo-text { font-size: 20px; font-weight: 700; color: #000000; }
        .logo-badge { font-size: 12px; font-weight: 600; color: #10b981; background: rgba(16, 185, 129, 0.15); padding: 4px 10px; border-radius: 20px; margin-left: 4px; }

        .header-right { display: flex; align-items: center; gap: 24px; }
        .notification-container { position: relative; cursor: pointer; }
        .notification-bell { background: rgba(16, 185, 129, 0.1); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; transition: all 0.25s; color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .notification-bell:hover { background: rgba(16, 185, 129, 0.2); transform: scale(1.05); border-color: #10b981; }
        .notification-badge { position: absolute; top: -6px; right: -6px; background: #ef4444; color: white; font-size: 11px; font-weight: 700; min-width: 20px; height: 20px; border-radius: 30px; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
        .notification-dropdown { position: absolute; top: 58px; right: 0; width: 360px; max-height: 420px; background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(16px); border-radius: 24px; border: 1px solid rgba(16, 185, 129, 0.3); box-shadow: 0 25px 40px -10px rgba(0,0,0,0.15); z-index: 200; display: none; overflow: hidden; }
        .notification-dropdown.show { display: block; animation: slideDown 0.25s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
        .notification-header { padding: 18px 20px; border-bottom: 1px solid rgba(16,185,129,0.2); font-weight: 700; color: #0F172A; }
        .notification-list { max-height: 320px; overflow-y: auto; }
        .notification-item { padding: 14px 20px; border-bottom: 1px solid rgba(16,185,129,0.1); cursor: pointer; transition: background 0.2s; display: flex; gap: 14px; color: #0F172A; }
        .notification-item:hover { background: rgba(16, 185, 129, 0.08); }
        .notification-item.unread { background: rgba(16, 185, 129, 0.08); }
        .notification-icon { font-size: 20px; }
        .notification-content { flex: 1; }
        .notification-title { color: #0F172A; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
        .notification-time { color: #64748b; font-size: 11px; }

        .user-info { display: flex; align-items: center; gap: 18px; }
        .user-name { color: #0F172A; font-size: 15px; font-weight: 500; }
        .avatar { width: 44px; height: 44px; background: linear-gradient(135deg, #10b981, #3b82f6); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 16px; border: 2px solid rgba(16,185,129,0.2); }
        .logout-btn { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); padding: 8px 20px; border-radius: 40px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
        .logout-btn:hover { background: rgba(239, 68, 68, 0.2); }

        .sidebar { position: fixed; top: 114px; left: 20px; bottom: 20px; width: 280px; background: rgba(228, 255, 237, 0.7); backdrop-filter: blur(14px); border-radius: 24px; border: 1px solid rgba(16, 185, 129, 0.25); padding: 24px 12px; z-index: 20; }
        .menu-item { padding: 14px 18px; margin: 6px 0; border-radius: 16px; cursor: pointer; display: flex; align-items: center; gap: 14px; font-size: 15px; font-weight: 500; color: #065f46; transition: all 0.25s; }
        .menu-item i { width: 22px; color: #10b981; }
        .menu-item:hover { background: rgba(16, 185, 129, 0.12); color: #064e3b; }
        .menu-item.active { background: linear-gradient(135deg, rgba(16,185,129,0.18), rgba(5,150,105,0.12)); color: #047857; border: 1px solid rgba(16,185,129,0.4); }

        .main-content { margin-left: 320px; margin-top: 114px; padding: 10px 30px 40px; position: relative; z-index: 10; }
        .view-container { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 40px; }
        .stat-card { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(8px); border-radius: 26px; padding: 24px 20px; border: 1px solid rgba(16, 185, 129, 0.2); transition: transform 0.2s, border-color 0.2s; }
        .stat-card:hover { transform: translateY(-4px); border-color: #10b981; box-shadow: 0 6px 18px rgba(16,185,129,0.1); }
        .stat-label { font-size: 15px; color: #4B5563; margin-bottom: 12px; font-weight: 500; }
        .stat-value { font-size: 42px; font-weight: 800; background: linear-gradient(135deg, #059669, #10b981); -webkit-background-clip: text; background-clip: text; color: transparent; }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .section-title { font-size: 26px; font-weight: 700; color: #0F172A; }

        .btn-primary { background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 12px 24px; border-radius: 40px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(16,185,129,0.5); }

        .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 48px; }
        .offer-card { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(8px); border-radius: 28px; padding: 26px 22px; border: 1px solid rgba(16, 185, 129, 0.15); transition: all 0.25s; }
        .offer-card:hover { transform: translateY(-6px); border-color: #10b981; box-shadow: 0 20px 30px -8px rgba(16,185,129,0.15); }
        .card-title { font-size: 20px; font-weight: 700; color: #0F172A; margin-bottom: 12px; }
        .card-detail { font-size: 14px; color: #4B5563; margin-bottom: 8px; }
        .applicants-count { margin: 16px 0; padding: 8px 16px; background: rgba(16, 185, 129, 0.1); border-radius: 12px; display: inline-block; font-size: 13px; color: #047857; border: 1px solid rgba(16, 185, 129, 0.2); }
        .card-buttons { display: flex; gap: 12px; margin-top: 20px; }
        .btn-outline { background: transparent; border: 1px solid rgba(16, 185, 129, 0.4); color: #047857; padding: 8px 16px; border-radius: 40px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .btn-outline:hover { background: rgba(16, 185, 129, 0.1); }

        .evaluation-list, .applicants-list { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(8px); border-radius: 28px; border: 1px solid rgba(16, 185, 129, 0.2); overflow: hidden; }
        .eval-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; border-bottom: 1px solid rgba(16,185,129,0.08); }
        .eval-item:last-child { border-bottom: none; }
        .eval-item:hover { background: rgba(16, 185, 129, 0.05); }
        .eval-info h4 { color: #0F172A; font-size: 16px; margin-bottom: 5px; }
        .eval-info p { color: #64748b; font-size: 13px; }

        .status-badge { display: inline-block; padding: 5px 16px; border-radius: 40px; font-size: 13px; font-weight: 600; }
        .status-pending { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }
        .status-active { background: #DCFCE7; color: #166534; border: 1px solid #86EFAC; }
        .status-accepted { background: #DCFCE7; color: #166534; border: 1px solid #86EFAC; }
        .status-rejected { background: #FEE2E2; color: #991B1B; border: 1px solid #FCA5A5; }
        .status-completed { background: #DCFCE7; color: #166534; border: 1px solid #86EFAC; }
        .status-closed { background: #F1F5F9; color: #475569; border: 1px solid #CBD5E1; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 300; }
        .modal-content { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); border-radius: 32px; padding: 32px; width: 700px; max-width: 90%; border: 1px solid rgba(16, 185, 129, 0.25); box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-height: 80vh; overflow-y: auto; }
        .modal-content h3 { color: #0F172A; font-size: 24px; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #4B5563; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px 18px; background: rgba(248, 250, 252, 0.9); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 16px; color: #0F172A; font-size: 15px; transition: 0.2s; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
        .modal-buttons { display: flex; gap: 12px; margin-top: 24px; }

        .empty-state { text-align: center; padding: 60px; color: #64748b; }
        .empty-state i { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }

        .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: transparent; color: #4B5563; border: 1px solid rgba(16,185,129,0.3); border-radius: 40px; cursor: pointer; margin-bottom: 24px; transition: 0.2s; font-size: 14px; font-weight: 500; }
        .back-btn:hover { background: rgba(16, 185, 129, 0.08); color: #0F172A; border-color: #10b981; }

        .table-applicants { width: 100%; border-collapse: collapse; margin-top: 16px; }
        .table-applicants th { text-align: left; padding: 12px 16px; background: rgba(16,185,129,0.05); font-weight: 600; color: #065f46; border-bottom: 1px solid rgba(16,185,129,0.2); }
        .table-applicants td { padding: 12px 16px; border-bottom: 1px solid rgba(16,185,129,0.1); color: #0F172A; }
        .table-applicants tr:hover td { background: rgba(16,185,129,0.03); }
    </style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<header class="header">
    <div class="logo" onclick="goHome()" title="Go to Home">
        <div class="logo-icon"><i class="fas fa-briefcase"></i></div>
        <span class="logo-text">Internship Platform</span>
        <span class="logo-badge">Company</span>
    </div>
    <div class="header-right">
        <div class="notification-container">
            <div class="notification-bell" onclick="toggleNotifications()">
                <i class="far fa-bell"></i>
                <span class="notification-badge" id="notificationCount">0</span>
            </div>
            <div class="notification-dropdown" id="notificationDropdown">
                <div class="notification-header"><i class="far fa-bell mr-2" style="color:#10b981;"></i>Notifications</div>
                <div class="notification-list" id="notificationList"></div>
            </div>
        </div>
        <div class="user-info">
            <span class="user-name" id="userName">Tech Solutions DZ</span>
            <div class="avatar" id="userAvatar">TS</div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt mr-1"></i> Logout</button>
        </div>
    </div>
</header>

<aside class="sidebar">
    <div class="menu-item active" data-view="dashboard"><i class="fas fa-chart-pie"></i> Dashboard</div>
    <div class="menu-item" data-view="offers"><i class="fas fa-briefcase"></i> My Offers</div>
    <div class="menu-item" data-view="applicants"><i class="fas fa-users"></i> Applicants</div>
    <div class="menu-item" data-view="evaluations"><i class="fas fa-star"></i> Evaluations</div>
    <div class="menu-item" data-view="notifications"><i class="fas fa-bell"></i> Notifications</div>
    <div class="menu-item" data-view="settings"><i class="fas fa-cog"></i> Settings</div>
</aside>

<main class="main-content" id="mainContent"></main>

<!-- Offer Modal -->
<div id="offerModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-plus-circle mr-2" style="color:#10b981;"></i>Propose New Internship</h3>
        <div class="form-group"><label>Internship Title</label><input type="text" id="offerTitle" placeholder="e.g., Frontend Developer"></div>
        <div class="form-group"><label>Duration</label><input type="text" id="offerDuration" placeholder="e.g., 3 months"></div>
        <div class="form-group"><label>Location</label><input type="text" id="offerLocation" placeholder="Algiers, Algeria"></div>
        <div class="form-group"><label>Required Skills</label><textarea id="offerSkills" rows="2" placeholder="React, CSS, Tailwind"></textarea></div>
        <div class="form-group"><label>Description</label><textarea id="offerDesc" rows="3" placeholder="Internship description..."></textarea></div>
        <div class="modal-buttons">
            <button class="btn-primary" onclick="saveOffer()" style="flex:1"><i class="fas fa-paper-plane mr-1"></i> Publish Offer</button>
            <button onclick="closeModal('offerModal')" class="btn-outline">Cancel</button>
        </div>
    </div>
</div>

<!-- Evaluation Modal -->
<div id="evalModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-star mr-2" style="color:#fbbf24;"></i>Evaluate Intern</h3>
        <div class="form-group"><label>Intern Name</label><input type="text" id="evalInternName" readonly></div>
        <div class="form-group"><label>Internship</label><input type="text" id="evalInternship" readonly></div>
        <div class="form-group"><label>Punctuality (1-5)</label><input type="number" id="evalPunctuality" min="1" max="5" value="4"></div>
        <div class="form-group"><label>Quality of Work (1-5)</label><input type="number" id="evalQuality" min="1" max="5" value="4"></div>
        <div class="form-group"><label>Teamwork (1-5)</label><input type="number" id="evalTeamwork" min="1" max="5" value="4"></div>
        <div class="form-group"><label>Comments</label><textarea id="evalComments" rows="3"></textarea></div>
        <div class="modal-buttons">
            <button class="btn-primary" onclick="submitEvaluation()" style="flex:1">Submit</button>
            <button onclick="closeModal('evalModal')" class="btn-outline">Cancel</button>
        </div>
    </div>
</div>

<!-- Applicants Modal -->
<div id="applicantsModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-users mr-2" style="color:#10b981;"></i>Applicants for <span id="applicantsOfferTitle"></span></h3>
        <div id="applicantsListContainer">
            <table class="table-applicants">
                <thead><tr><th>Name</th><th>Email</th><th>Applied Date</th><th>Status</th><th>Action</th></tr></thead>


                <tbody id="applicantsTableBody"></tbody>
            </table>
            <div id="noApplicants" class="empty-state" style="display:none;"><i class="fas fa-user-slash"></i><p>No applicants yet</p></div>
        </div>
        <div class="modal-buttons">
            <button onclick="closeModal('applicantsModal')" class="btn-outline" style="margin-left:auto">Close</button>
        </div>
    </div>
</div>

<script>
    
    // --- حماية الصفحة: هذا الكود يجب أن يكون أول شيء ينفذ ---
    (function() {
        const user = JSON.parse(localStorage.getItem('currentUser'));
        
        // إذا لم يوجد مستخدم مسجل، أو كان المستخدم ليس "شركة"
        if (!user || user.role !== 'company') {
            alert('Access Denied. Please login first.');
            window.location.href = 'login.html'; // توجيهه لصفحة الدخول
            return;
        }
        
        // إذا كان المستخدم موجود، يمكنك عرض اسمه في الصفحة
        console.log("Welcome back, " + user.name);
    })();

    // ... باقي كود الصفحة الخاص بعرض التربصات أو إدارة البيانات ...
    // ==================== DATA ====================
    let offers = [];
    let pendingEvaluations = [];
    let currentEvalId = null;
    let notifications = [];
    let currentView = 'dashboard';

    async function loadCompanyOffers() {
    const user = JSON.parse(localStorage.getItem('currentUser'));
    if (!user) return;

    try {
        // طلب كل العروض من السيرفر
        const response = await fetch('http://localhost:5000/api/internships');
        const allOffers = await response.json();

        // فلترة العروض لكي تظهر عروض هذه الشركة فقط
        const myOffers = allOffers.filter(offer => offer.CompanyID === user.id);

        // تحديث الجدول في الواجهة
        renderOffersTable(myOffers);
    } catch (error) {
        console.error("Error loading offers:", error);
    }
}

function renderOffersTable(offersList) {
    const tableBody = document.getElementById('offersTableBody'); // تأكد أن هذا الـ ID موجود في الـ HTML
    if (!tableBody) return;

    if (offersList.length === 0) {
        tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No offers published yet.</td></tr>';
        return;
    }

    tableBody.innerHTML = offersList.map(offer => `
        <tr>
            <td>${offer.Title}</td>
            <td>${offer.InternshipProject}</td>
            <td>${new Date(offer.StartDate).toLocaleDateString()}</td>
            <td><span class="status-badge status-${offer.Statut.toLowerCase()}">${offer.Statut}</span></td>
            <td>
    
            <button class="btn-outline" onclick="viewApplicants(${offer.InternshipID})">
             <i class="fas fa-users"></i> Applicants
            </button>
            </td>
        </tr>
    `).join('');
}

    // sample applicants data (would be loaded from Excel/API in the future)
    const sampleApplicants = [
        { name: 'Ahmed Benali', email: 'ahmed@univ-tebessa.dz', applied: '2026-04-10', status: 'pending' },
        { name: 'Sarah Merad', email: 's.merad@esi.dz', applied: '2026-04-11', status: 'interview' },
        { name: 'Mohamed Larbi', email: 'm.larbi@univ-constantine.dz', applied: '2026-04-12', status: 'accepted' },
        { name: 'Amina Khelifi', email: 'a.khelifi@univ-alger.dz', applied: '2026-04-08', status: 'pending' }
    ];

    // ==================== LOCAL STORAGE ====================
    function loadData() {
        offers = JSON.parse(localStorage.getItem('companyOffers')) || [
            { id: 1, title: "Frontend Developer Intern", duration: "3 months", location: "Algiers", skills: "React, CSS, Tailwind", applicants: 4, status: "active", published: "2026-04-01", description: "Build modern web apps" },
            { id: 2, title: "Backend Developer Intern", duration: "4 months", location: "Oran", skills: "Node.js, MongoDB", applicants: 3, status: "active", published: "2026-04-03", description: "Develop scalable APIs" },
            { id: 3, title: "UI/UX Designer Intern", duration: "2 months", location: "Constantine", skills: "Figma, Adobe XD", applicants: 1, status: "closed", published: "2026-03-28", description: "Design user interfaces" },
            { id: 4, title: "Marketing Intern", duration: "3 months", location: "Remote", skills: "SEO, Content Writing", applicants: 5, status: "active", published: "2026-04-10", description: "Digital marketing campaigns" }
        ];
        pendingEvaluations = JSON.parse(localStorage.getItem('pendingEvaluations')) || [
            { id: 1, internName: "Ahmed Benali", internship: "Frontend Developer Intern", startDate: "Mar 1, 2024" },
            { id: 2, internName: "Sarah Merad", internship: "Backend Developer Intern", startDate: "Mar 10, 2024" }
        ];

        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (user) {
            let companies = JSON.parse(localStorage.getItem('registeredCompanies')) || [];
            let fullData = companies.find(c => c.id === user.id);
            let name = fullData ? fullData.companyName : (user.companyName || user.name || 'Tech Solutions DZ');
            document.getElementById('userName').textContent = name;
            document.getElementById('userAvatar').textContent = name.split(' ').map(w => w[0]).join('').toUpperCase();
        }
    }

    function loadNotifications() {
        const saved = localStorage.getItem('companyNotifications');
        notifications = saved ? JSON.parse(saved) : [
            { id: 1, title: 'New Applicant', message: 'Ahmed Benali applied for Frontend Developer Intern', type: 'success', time: new Date().toLocaleString(), read: false },
            { id: 2, title: 'Offer Expiring', message: 'UI/UX Designer Intern offer has closed', type: 'warning', time: new Date(Date.now()-86400000).toLocaleString(), read: true }
        ];
        updateNotificationBadge();
    }

    function saveAll() {
        localStorage.setItem('companyOffers', JSON.stringify(offers));
        localStorage.setItem('pendingEvaluations', JSON.stringify(pendingEvaluations));
        localStorage.setItem('companyNotifications', JSON.stringify(notifications));
    }

    // ==================== NOTIFICATIONS ====================
    function updateNotificationBadge() {
        const badge = document.getElementById('notificationCount');
        if (badge) {
            const unread = notifications.filter(n => !n.read).length;
            badge.textContent = unread;
            badge.style.display = unread > 0 ? 'flex' : 'none';
        }
    }

    function renderNotificationDropdown() {
        const container = document.getElementById('notificationList');
        if (!container) return;
        if (notifications.length === 0) {
            container.innerHTML = '<div style="padding: 24px; text-align: center; color: #64748b;">No notifications</div>';
            return;
        }
        container.innerHTML = notifications.slice(0, 10).map(n => `
            <div class="notification-item ${!n.read ? 'unread' : ''}" onclick="markAsRead(${n.id})">
                <div class="notification-icon">${n.type === 'success' ? '✅' : n.type === 'warning' ? '⚠️' : '📢'}</div>
                <div class="notification-content">
                    <div class="notification-title">${n.title}</div>
                    <div style="font-size: 12px; color: #4B5563;">${n.message}</div>
                    <div class="notification-time">${n.time}</div>
                </div>
            </div>
        `).join('');
    }

    function markAsRead(id) {
        const notif = notifications.find(n => n.id === id);
        if (notif) { notif.read = true; saveAll(); renderNotificationDropdown(); }
    }

    function toggleNotifications() {
        const dropdown = document.getElementById('notificationDropdown');
        dropdown.classList.toggle('show');
        renderNotificationDropdown();
    }

    function addNotification(title, message, type = 'info') {
        notifications.unshift({ id: Date.now(), title, message, type, time: new Date().toLocaleString(), read: false });
        saveAll();
        renderNotificationDropdown();
    }

    // ==================== RENDERING ====================
function renderView(view) {
        currentView = view;
        document.querySelectorAll('.menu-item').forEach(item => item.classList.toggle('active', item.dataset.view === view));
        const container = document.getElementById('mainContent');
        switch(view) {
            case 'dashboard': renderDashboard(container); break;
            case 'offers': renderOffersView(container); break;
            case 'applicants': renderApplicantsView(container); break;
            case 'evaluations': renderEvaluationsView(container); break;
            case 'notifications': renderNotificationsView(container); break;
            case 'settings': renderSettingsView(container); break;
            default: renderDashboard(container);
        }

        // Add "Back to Dashboard" button for every view except dashboard
        if (view !== 'dashboard') {
            const viewContainer = container.querySelector('.view-container');
            if (viewContainer && !viewContainer.querySelector('.back-btn')) {
                viewContainer.insertAdjacentHTML('afterbegin',
                    '<button class="back-btn" onclick="renderView(\'dashboard\')"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>'
                );
            }
        }
    }

    function getRecentOffers() {
        return offers.filter(o => o.status === 'active')
            .sort((a, b) => new Date(b.published) - new Date(a.published))
            .slice(0, 3);
    }

    function getExpiredOffers() {
        return offers.filter(o => o.status === 'closed')
            .sort((a, b) => new Date(b.published) - new Date(a.published));
    }

    function renderDashboard(container) {
        const activeOffers = offers.filter(o => o.status === 'active');
        const totalApplicants = offers.reduce((sum, o) => sum + (o.applicants || 0), 0);
        const recent = getRecentOffers();
        const expired = getExpiredOffers();

        container.innerHTML = `
        <div class="view-container">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-label"><i class="fas fa-bullhorn mr-1" style="color:#10b981;"></i> Active Offers</div><div class="stat-value">${activeOffers.length}</div></div>
                <div class="stat-card"><div class="stat-label"><i class="fas fa-users mr-1"></i> Total Applicants</div><div class="stat-value">${totalApplicants}</div></div>
                <div class="stat-card"><div class="stat-label"><i class="fas fa-user-check mr-1"></i> Active Interns</div><div class="stat-value">${pendingEvaluations.length}</div></div>
                <div class="stat-card"><div class="stat-label"><i class="fas fa-archive mr-1"></i> Expired</div><div class="stat-value">${expired.length}</div></div>
            </div>

            <div class="section-header">
                <h2 class="section-title">📌 Recent Offers</h2>
                <button class="btn-primary" onclick="openOfferModal()"><i class="fas fa-plus mr-1"></i> New Offer</button>
            </div>
            <div class="cards-grid">
                ${recent.map(o => renderOfferCard(o)).join('')}
                ${recent.length === 0 ? '<div class="empty-state" style="grid-column:1/-1;"><i class="fas fa-inbox"></i><p>No recent offers</p></div>' : ''}
            </div>

            <div class="section-header">
                <h2 class="section-title">🗂️ Expired Offers</h2>
            </div>
            <div class="cards-grid">
                ${expired.map(o => renderOfferCard(o, true)).join('')}
                ${expired.length === 0 ? '<div class="empty-state" style="grid-column:1/-1;"><i class="fas fa-archive"></i><p>No expired offers</p></div>' : ''}
            </div>

            <div class="section-header">
                <h2 class="section-title">⭐ Pending Evaluations</h2>
                <button class="btn-outline" onclick="renderView('evaluations')">View All <i class="fas fa-arrow-right ml-1"></i></button>
            </div>
            <div class="evaluation-list">
                ${pendingEvaluations.slice(0, 3).map(e => renderEvalItem(e)).join('')}
                ${pendingEvaluations.length === 0 ? '<div class="empty-state"><i class="fas fa-check-circle"></i><p>No pending evaluations</p></div>' : ''}
            </div>
        </div>`;
    }

    function renderOfferCard(offer, isExpired = false) {
        const statusClass = isExpired ? 'status-closed' : 'status-active';
        const statusText = isExpired ? 'Closed' : 'Active';
        return `
        <div class="offer-card">
            <div class="card-title">${offer.title}</div>
            <div class="card-detail"><i class="far fa-clock mr-1"></i>${offer.duration}</div>
            <div class="card-detail"><i class="fas fa-map-pin mr-1"></i>${offer.location}</div>
            <div class="card-detail"><i class="fas fa-tools mr-1"></i>${offer.skills}</div>
            <div class="applicants-count"><i class="fas fa-users mr-1"></i>${offer.applicants || 0} applicants</div>
            <span class="status-badge ${statusClass}" style="margin-left: 12px;">${statusText}</span>
            <div class="card-buttons">
                <button class="btn-outline" onclick="viewApplicants(${offer.id})"><i class="fas fa-eye mr-1"></i> View Applicants</button>
                ${!isExpired ? `<button class="btn-outline" onclick="closeOffer(${offer.id})"><i class="fas fa-times mr-1"></i> Close</button>` : ''}
            </div>
        </div>`;
    }

    function renderEvalItem(evalItem) {
        return `
        <div class="eval-item">
            <div class="eval-info">
                <h4>${evalItem.internName}</h4>
                <p>${evalItem.internship} · Started: ${evalItem.startDate}</p>
            </div>
            <div style="display:flex; gap:12px; align-items:center">
                <span class="status-badge status-pending">Pending Review</span>
                <button class="btn-outline" onclick="openEvalModal(${evalItem.id})"><i class="fas fa-star mr-1"></i> Evaluate</button>
            </div>
        </div>`;
    }

    async function renderOffersView(container) {
    const user = JSON.parse(localStorage.getItem('currentUser'));
    
    // 1. رسم هيكل الصفحة والجدول فوراً
    container.innerHTML = `
        <div class="view-container">
            <div class="section-header">
                <h2 class="section-title">My Internship Offers</h2>
                <button class="btn-primary" onclick="openOfferModal()">
                    <i class="fas fa-plus"></i> Post New Offer
                </button>
            </div>
            <div class="evaluation-list">
                <table class="table-applicants" style="width:100%">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Project</th>
                            <th>Start Date</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="offersTableBody">
                        <tr><td colspan="5" style="text-align:center; padding:20px;">Loading data...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    `;

    // 2. جلب البيانات الحقيقية من السيرفر
    try {
        const response = await fetch('http://localhost:5000/api/internships');
        const allOffers = await response.json();
        
        // تصفية العروض لتظهر الخاصة بشركتك فقط
        const myOffers = allOffers.filter(o => o.CompanyID === user.id);
        const tableBody = document.getElementById('offersTableBody');

        if (myOffers.length === 0) {
            tableBody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px;">No offers published yet.</td></tr>';
            return;
        }

        // وضع البيانات في الجدول
        tableBody.innerHTML = myOffers.map(offer => `
            <tr>
                <td><strong>${offer.Title}</strong></td>
                <td>${offer.InternshipProject || 'Digitalization'}</td>
                <td>${new Date(offer.StartDate).toLocaleDateString()}</td>
                <td><span class="status-badge status-active">${offer.Statut}</span></td>
                <td>
                    <button class="btn-outline" onclick="viewApplicants(${offer.InternshipID})">
                        <i class="fas fa-users"></i> Applicants
                    </button>
                </td>
            </tr>
        `).join('');
    } catch (error) {
        console.error("Fetch Error:", error);
        document.getElementById('offersTableBody').innerHTML = '<tr><td colspan="5" style="color:red; text-align:center;">Error connecting to server</td></tr>';
    }
}

    function renderApplicantsView(container) {
        const offersWithApplicants = offers.filter(o => (o.applicants || 0) > 0);
        container.innerHTML = `
        <div class="view-container">
            <div class="section-header"><h2 class="section-title">Offers with Applicants</h2></div>
            ${offersWithApplicants.map(offer => `
                <div class="offer-card" style="margin-bottom: 20px;">
                    <div class="card-title">${offer.title}</div>
                    <div class="applicants-count"><i class="fas fa-users mr-1"></i>${offer.applicants} applicant(s)</div>
                    <button class="btn-outline" style="margin-top: 12px;" onclick="viewApplicants(${offer.id})"><i class="fas fa-list mr-1"></i> View Details</button>
                </div>
            `).join('')}
            ${offersWithApplicants.length === 0 ? '<div class="empty-state"><i class="fas fa-users-slash"></i><p>No applicants yet</p></div>' : ''}
        </div>`;
    }

    function renderEvaluationsView(container) {
        container.innerHTML = `
        <div class="view-container">
            <div class="section-header"><h2 class="section-title">Pending Evaluations</h2></div>
            <div class="evaluation-list">
                ${pendingEvaluations.map(e => renderEvalItem(e)).join('')}
                ${pendingEvaluations.length === 0 ? '<div class="empty-state"><i class="fas fa-check-circle"></i><p>No pending evaluations</p></div>' : ''}
            </div>
        </div>`;
    }

    function renderNotificationsView(container) {
        container.innerHTML = `
        <div class="view-container">
            <div class="section-header"><h2 class="section-title">All Notifications</h2></div>
            <div style="max-width: 700px;">
                ${notifications.map(n => `
                    <div class="notification-item ${!n.read ? 'unread' : ''}" style="border-radius: 16px; margin-bottom: 8px; background: rgba(255,255,255,0.7);" onclick="markAsRead(${n.id})">
                        <div class="notification-icon">${n.type === 'success' ? '✅' : n.type === 'warning' ? '⚠️' : '📢'}</div>
                        <div class="notification-content">
                            <div class="notification-title">${n.title}</div>
                            <div style="font-size: 13px; color: #4B5563;">${n.message}</div>
                            <div class="notification-time">${n.time}</div>
                        </div>
                    </div>
                `).join('')}
            </div>
        </div>`;
    }

    function renderSettingsView(container) {
        container.innerHTML = `
        <div class="view-container">
            <div class="section-header"><h2 class="section-title">Settings</h2></div>
            <div class="offer-card" style="max-width: 600px;">
                <h3 style="color: #0F172A; margin-bottom: 24px;">Company Profile</h3>
                <div class="form-group"><label>Company Name</label><input type="text" value="Tech Solutions DZ"></div>
                <div class="form-group"><label>Email</label><input type="email" value="tech@techsolutions.dz"></div>
                <div class="form-group"><label>Industry</label><input type="text" value="Software & AI"></div>
                <div class="form-group"><label>Description</label><textarea rows="3">Leading software development company.</textarea></div>
                <button class="btn-primary"><i class="fas fa-save mr-1"></i> Save Changes</button>
            </div>
        </div>`;
    }

    // ==================== MODALS & ACTIONS ====================
    function openOfferModal() { document.getElementById('offerModal').style.display = 'flex'; }

async function saveOffer() {
    const fields = ['offerTitle', 'offerDuration', 'offerLocation', 'offerSkills', 'offerDesc'];
    const values = fields.map(id => document.getElementById(id).value.trim());
    const user = JSON.parse(localStorage.getItem('currentUser'));

    if (!values[0] || !values[1]) return alert('Title and Duration are required');
    
    const offerData = {
        title: values[0],
        description: `${values[4]} | Skills: ${values[3]} | Loc: ${values[2]} | Duration: ${values[1]}`,
        statut: 'Active', project: 'IFTMS Project',
        startDate: new Date().toISOString().split('T')[0],
        endDate: new Date(Date.now() + 7.7e9).toISOString().split('T')[0],
        companyId: user.id, departmentId: 1
    };

    try {
        const res = await fetch('http://localhost:5000/api/add-offer', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(offerData)
        });

        if (res.ok) {
            alert('Success! Offer added.');
            closeModal('offerModal');
            fields.forEach(id => document.getElementById(id).value = '');
            
            // الحل القاطع: استدعاء عرض العروض مباشرة ومنع أي شيء آخر
            if (window.renderView) {
                window.renderView('offers'); 
            }
        } else {
            alert('Error saving offer');
        }
    } catch (e) { alert('Server offline'); }
}

    async function viewApplicants(offerId) {
    // 1. تجهيز العناصر وتغيير العنوان
    const tbody = document.getElementById('applicantsTableBody');
    const modal = document.getElementById('applicantsModal');
    document.getElementById('applicantsOfferTitle').textContent = "Checking Applicants...";

    // 2. إظهار النافذة بوضعية التحميل
    modal.style.display = 'flex';
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px;">Loading from Database...</td></tr>';

    try {
        // 3. جلب المتقدمين الحقيقيين من السيرفر باستخدام رقم العرض
        const response = await fetch(`http://localhost:5000/api/applicants/${offerId}`);
        const applicants = await response.json();

        // تحديث العنوان ليظهر اسم العرض الحقيقي (اختياري)
        document.getElementById('applicantsOfferTitle').textContent = `Offer ID: ${offerId}`;

        if (applicants.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:20px;">No applicants yet.</td></tr>';
            return;
        }

        // 4. بناء الجدول بالبيانات القادمة من جداول intern و registration
        tbody.innerHTML = applicants.map(a => `
            <tr>
                <td>${a.FirstName} ${a.LastName}</td>
                <td>${a.Email}</td>
                <td>${new Date(a.RegistrationDate).toLocaleDateString()}</td>
                <td><span class="status-badge status-${a.Status?.toLowerCase() || 'pending'}">${a.Status}</span></td>
                <td>
                    <button class="btn-outline" style="color:#10b981; border-color:#10b981;" onclick="updateStatus(${a.RegistrationID}, 'Accepted')">Accept</button>
                    <button class="btn-outline" style="color:#ef4444; border-color:#ef4444;" onclick="updateStatus(${a.RegistrationID}, 'Rejected')">Reject</button>
                </td>
            </tr>
        `).join('');

    } catch (error) {
        tbody.innerHTML = '<tr><td colspan="5" style="color:red; text-align:center;">Error connecting to MySQL.</td></tr>';
    }
}

//دالة التحديث 
async function updateStatus(regId, newStatus) {
    try {
        await fetch('http://localhost:5000/api/update-status', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ regId, status: newStatus })
        });
        alert("Status updated!");
        closeModal('applicantsModal');
    } catch (e) {
        alert("Server error");
    }
}

    // NEW: Accept or reject an applicant
    function handleApplicant(email, action) {
        const applicant = sampleApplicants.find(a => a.email === email);
        if (!applicant) return;
        applicant.status = action === 'accept' ? 'accepted' : 'rejected';
        addNotification(
            action === 'accept' ? 'Applicant Accepted' : 'Applicant Rejected',
            `${applicant.name} has been ${applicant.status}.`,
            action === 'accept' ? 'success' : 'warning'
        );
        // Refresh the modal table
        viewApplicants(offers.find(o => o.title === document.getElementById('applicantsOfferTitle').textContent)?.id || 1);
    }

    function closeOffer(offerId) {
        const offer = offers.find(o => o.id === offerId);
        if (offer && confirm(`Close "${offer.title}"?`)) {
            offer.status = 'closed';
            saveAll();
            addNotification('Offer Closed', `"${offer.title}" has been closed.`, 'warning');
            renderView(currentView);
        }
    }

    function openEvalModal(evalId) {
        currentEvalId = evalId;
        const item = pendingEvaluations.find(e => e.id === evalId);
        if (item) {
            document.getElementById('evalInternName').value = item.internName;
            document.getElementById('evalInternship').value = item.internship;
            document.getElementById('evalModal').style.display = 'flex';
        }
    }

    function submitEvaluation() {
        const idx = pendingEvaluations.findIndex(e => e.id === currentEvalId);
        if (idx !== -1) {
            const name = pendingEvaluations[idx].internName;
            pendingEvaluations.splice(idx, 1);
            saveAll();
            closeModal('evalModal');
            addNotification('Evaluation Done', `You have evaluated ${name}.`, 'success');
            renderView(currentView);
        }
    }

    function closeModal(modalId) { document.getElementById(modalId).style.display = 'none'; }

function logout() { 
    // إظهار رسالة تأكيد للمستخدم
    if (confirm('Are you sure you want to logout?')) { 
        // 1. مسح بيانات المستخدم من ذاكرة المتصفح تماماً
        localStorage.removeItem('currentUser'); 
        
        // 2. توجيه المستخدم لصفحة تسجيل الدخول (أو الصفحة الرئيسية)
        window.location.href = 'login.html'; 
    } 
}
    function goHome() { window.location.href = 'homepage.html'; }
    window.goHome = goHome;
    window.renderView = renderView;
    window.openOfferModal = openOfferModal;
    window.saveOffer = saveOffer;
    window.viewApplicants = viewApplicants;
    window.handleApplicant = handleApplicant;
    window.closeOffer = closeOffer;
    window.openEvalModal = openEvalModal;
    window.submitEvaluation = submitEvaluation;
    window.closeModal = closeModal;
    window.logout = logout;

    document.addEventListener('click', (e) => {
        const notifContainer = document.querySelector('.notification-container');
        const dropdown = document.getElementById('notificationDropdown');
        if (notifContainer && !notifContainer.contains(e.target) && dropdown.classList.contains('show')) dropdown.classList.remove('show');
    });
    window.onclick = function(event) {
        if (event.target.classList.contains('modal')) event.target.style.display = 'none';
    };

    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => { const view = item.dataset.view; if (view) renderView(view); });
    });

    loadData();
    loadNotifications();
    renderView('dashboard');


// وفي نهاية الملف تماماً، تأكد من وجود هذا الجزء لتشغيل الجلب تلقائياً:
document.addEventListener('DOMContentLoaded', () => {
    loadCompanyOffers(); 
});
</script>
