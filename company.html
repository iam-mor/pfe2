<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Company Dashboard · Internship Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #EEF2F6 0%, #E6ECF3 40%, #F4F7FB 100%);
            background-size: 200% 200%;
            animation: gradientShift 20s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
            color: #0F172A;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .blob {
            position: fixed; width: 600px; height: 600px; border-radius: 50%; filter: blur(70px); opacity: 0.18;
            pointer-events: none; animation: floatBlob 18s infinite ease-in-out; z-index: 0;
        }
        .blob-1 { background: radial-gradient(circle, rgba(16,185,129,0.5) 0%, rgba(16,185,129,0) 70%); top: -200px; right: -150px; }
        .blob-2 { background: radial-gradient(circle, rgba(59,130,246,0.4) 0%, rgba(59,130,246,0) 70%); bottom: -200px; left: -150px; animation-delay: -9s; }
        @keyframes floatBlob {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 35px) scale(0.95); }
        }
        .header {
            position: fixed; top: 20px; left: 20px; right: 20px; height: 70px;
            background: rgba(244, 247, 251, 0.8); backdrop-filter: blur(14px); border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center; padding: 0 28px;
            z-index: 100; border: 1px solid rgba(16, 185, 129, 0.25);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            animation: pulseGlow 4s infinite ease-in-out;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-color: rgba(16,185,129,0.25); }
            50% { box-shadow: 0 8px 30px rgba(16,185,129,0.35); border-color: rgba(16,185,129,0.5); }
        }
        .logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
        .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #10b981, #3b82f6); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .logo-icon i { color: white; font-size: 14px; }
        .logo-text { font-size: 20px; font-weight: 700; color: #000000; }
        .logo-badge { font-size: 12px; font-weight: 600; color: #10b981; background: rgba(16, 185, 129, 0.15); padding: 4px 10px; border-radius: 20px; margin-left: 4px; }
        .header-right { display: flex; align-items: center; gap: 24px; }
        .notification-container { position: relative; cursor: pointer; }
        .notification-bell { background: rgba(16, 185, 129, 0.1); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; transition: all 0.25s; color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .notification-bell:hover { background: rgba(16, 185, 129, 0.2); transform: scale(1.05); border-color: #10b981; }
        .notification-badge { position: absolute; top: -6px; right: -6px; background: #ef4444; color: white; font-size: 11px; font-weight: 700; min-width: 20px; height: 20px; border-radius: 30px; display: flex; align-items: center; justify-content: center; padding: 0 5px; }
        .notification-dropdown { position: absolute; top: 58px; right: 0; width: 360px; max-height: 420px; background: rgba(255, 255, 255, 0.96); backdrop-filter: blur(16px); border-radius: 24px; border: 1px solid rgba(16, 185, 129, 0.3); box-shadow: 0 25px 40px -10px rgba(0,0,0,0.15); z-index: 200; display: none; overflow: hidden; }
        .notification-dropdown.show { display: block; animation: slideDown 0.25s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
        .notification-header { padding: 18px 20px; border-bottom: 1px solid rgba(16,185,129,0.2); font-weight: 700; color: #0F172A; }
        .notification-list { max-height: 320px; overflow-y: auto; }
        .notification-item { padding: 14px 20px; border-bottom: 1px solid rgba(16,185,129,0.1); cursor: pointer; transition: background 0.2s; display: flex; gap: 14px; color: #0F172A; }
        .notification-item:hover { background: rgba(16, 185, 129, 0.08); }
        .notification-item.unread { background: rgba(16, 185, 129, 0.08); }
        .notification-icon { font-size: 20px; }
        .notification-content { flex: 1; }
        .notification-title { color: #0F172A; font-size: 13px; font-weight: 500; margin-bottom: 4px; }
        .notification-time { color: #64748b; font-size: 11px; }
        .user-info { display: flex; align-items: center; gap: 18px; }
        .user-name { color: #0F172A; font-size: 15px; font-weight: 500; }
        .avatar { width: 44px; height: 44px; background: linear-gradient(135deg, #10b981, #3b82f6); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 16px; border: 2px solid rgba(16,185,129,0.2); }
        .logout-btn { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.4); padding: 8px 20px; border-radius: 40px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
        .logout-btn:hover { background: rgba(239, 68, 68, 0.2); }
        .sidebar { position: fixed; top: 114px; left: 20px; bottom: 20px; width: 280px; background: rgba(228, 255, 237, 0.7); backdrop-filter: blur(14px); border-radius: 24px; border: 1px solid rgba(16, 185, 129, 0.25); padding: 24px 12px; z-index: 20; }
        .menu-item { padding: 14px 18px; margin: 6px 0; border-radius: 16px; cursor: pointer; display: flex; align-items: center; gap: 14px; font-size: 15px; font-weight: 500; color: #065f46; transition: all 0.25s; }
        .menu-item i { width: 22px; color: #10b981; }
        .menu-item:hover { background: rgba(16, 185, 129, 0.12); color: #064e3b; }
        .menu-item.active { background: linear-gradient(135deg, rgba(16,185,129,0.18), rgba(5,150,105,0.12)); color: #047857; border: 1px solid rgba(16,185,129,0.4); }
        .main-content { margin-left: 320px; margin-top: 114px; padding: 10px 30px 40px; position: relative; z-index: 10; }
        .view-container { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 40px; }
        .stat-card { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(8px); border-radius: 26px; padding: 24px 20px; border: 1px solid rgba(16, 185, 129, 0.2); transition: transform 0.2s, border-color 0.2s; }
        .stat-card:hover { transform: translateY(-4px); border-color: #10b981; box-shadow: 0 6px 18px rgba(16,185,129,0.1); }
        .stat-label { font-size: 15px; color: #4B5563; margin-bottom: 12px; font-weight: 500; }
        .stat-value { font-size: 42px; font-weight: 800; background: linear-gradient(135deg, #059669, #10b981); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .section-title { font-size: 26px; font-weight: 700; color: #0F172A; }
        .btn-primary { background: linear-gradient(135deg, #10b981, #059669); color: white; border: none; padding: 12px 24px; border-radius: 40px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(16,185,129,0.5); }
        .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-bottom: 48px; }
        .offer-card { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(8px); border-radius: 28px; padding: 26px 22px; border: 1px solid rgba(16, 185, 129, 0.15); transition: all 0.25s; }
        .offer-card:hover { transform: translateY(-6px); border-color: #10b981; box-shadow: 0 20px 30px -8px rgba(16,185,129,0.15); }
        .card-title { font-size: 20px; font-weight: 700; color: #0F172A; margin-bottom: 12px; }
        .card-detail { font-size: 14px; color: #4B5563; margin-bottom: 8px; }
        .applicants-count { margin: 16px 0; padding: 8px 16px; background: rgba(16, 185, 129, 0.1); border-radius: 12px; display: inline-block; font-size: 13px; color: #047857; border: 1px solid rgba(16, 185, 129, 0.2); }
        .card-buttons { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
        .btn-outline { background: transparent; border: 1px solid rgba(16, 185, 129, 0.4); color: #047857; padding: 8px 16px; border-radius: 40px; font-size: 12px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
        .btn-outline:hover { background: rgba(16, 185, 129, 0.1); }
        .btn-sign { background: #8b5cf6; color: white; border: none; padding: 8px 16px; border-radius: 40px; font-size: 12px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
        .btn-sign:hover { background: #7c3aed; }
        .btn-download { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 40px; font-size: 12px; cursor: pointer; transition: all 0.2s; font-weight: 500; }
        .btn-download:hover { background: #2563eb; }
        .btn-accept { background: rgba(34,197,94,0.15); color: #166534; border: 1px solid rgba(34,197,94,0.4); padding: 6px 14px; border-radius: 40px; font-size: 11px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .btn-accept:hover { background: rgba(34,197,94,0.3); }
        .btn-reject { background: rgba(239,68,68,0.15); color: #991B1B; border: 1px solid rgba(239,68,68,0.4); padding: 6px 14px; border-radius: 40px; font-size: 11px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .btn-reject:hover { background: rgba(239,68,68,0.3); }
        .evaluation-list, .applicants-list { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(8px); border-radius: 28px; border: 1px solid rgba(16, 185, 129, 0.2); overflow: hidden; }
        .eval-item { display: flex; justify-content: space-between; align-items: center; padding: 18px 24px; border-bottom: 1px solid rgba(16,185,129,0.08); }
        .eval-item:last-child { border-bottom: none; }
        .eval-item:hover { background: rgba(16, 185, 129, 0.05); }
        .eval-info h4 { color: #0F172A; font-size: 16px; margin-bottom: 5px; }
        .eval-info p { color: #64748b; font-size: 13px; }
        .status-badge { display: inline-block; padding: 5px 16px; border-radius: 40px; font-size: 13px; font-weight: 600; }
        .status-pending { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }
        .status-active { background: #DCFCE7; color: #166534; border: 1px solid #86EFAC; }
        .status-accepted { background: #DCFCE7; color: #166534; border: 1px solid #86EFAC; }
        .status-rejected { background: #FEE2E2; color: #991B1B; border: 1px solid #FCA5A5; }
        .status-completed { background: #DCFCE7; color: #166534; border: 1px solid #86EFAC; }
        .status-closed { background: #F1F5F9; color: #475569; border: 1px solid #CBD5E1; }
        .status-evaluated { background: #DBEAFE; color: #1E40AF; border: 1px solid #93C5FD; }
        .status-signed { background: #EDE9FE; color: #5B21B6; border: 1px solid #C4B5FD; }
        .tabs { display: flex; gap: 12px; margin-bottom: 28px; border-bottom: 1px solid rgba(16,185,129,0.15); padding-bottom: 8px; flex-wrap: wrap; }
        .tab { padding: 10px 24px; background: transparent; border: none; color: #64748b; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 40px; transition: all 0.3s; }
        .tab:hover { background: rgba(16,185,129,0.08); color: #0F172A; }
        .tab.active { background: rgba(16,185,129,0.15); color: #10b981; }
        .inner-tab-content { display: none; }
        .inner-tab-content.active { display: block; animation: fadeIn 0.3s ease; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 300; }
        .modal-content { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(16px); border-radius: 32px; padding: 32px; width: 700px; max-width: 90%; border: 1px solid rgba(16, 185, 129, 0.25); box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-height: 80vh; overflow-y: auto; }
        .modal-content h3 { color: #0F172A; font-size: 24px; margin-bottom: 24px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; color: #4B5563; font-size: 14px; font-weight: 500; margin-bottom: 8px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 14px 18px; background: rgba(248, 250, 252, 0.9); border: 1px solid rgba(16, 185, 129, 0.3); border-radius: 16px; color: #0F172A; font-size: 15px; transition: 0.2s; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #10b981; box-shadow: 0 0 0 3px rgba(16,185,129,0.1); }
        .modal-buttons { display: flex; gap: 12px; margin-top: 24px; }
        .empty-state { text-align: center; padding: 60px; color: #64748b; }
        .empty-state i { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }
        .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: transparent; color: #4B5563; border: 1px solid rgba(16,185,129,0.3); border-radius: 40px; cursor: pointer; margin-bottom: 24px; transition: 0.2s; font-size: 14px; font-weight: 500; }
        .back-btn:hover { background: rgba(16, 185, 129, 0.08); color: #0F172A; border-color: #10b981; }
        .table-applicants { width: 100%; border-collapse: collapse; margin-top: 16px; }
        .table-applicants th { text-align: left; padding: 12px 16px; background: rgba(16,185,129,0.05); font-weight: 600; color: #065f46; border-bottom: 1px solid rgba(16,185,129,0.2); }
        .table-applicants td { padding: 12px 16px; border-bottom: 1px solid rgba(16,185,129,0.1); color: #0F172A; }
        .table-applicants tr:hover td { background: rgba(16,185,129,0.03); }
        .eval-btn { background: #fbbf24; color: #0F172A; border: none; padding: 6px 14px; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 12px; }
        .eval-btn:hover { background: #f59e0b; }
        .agreement-preview { background: rgba(248,250,252,0.9); border-radius: 16px; padding: 20px; margin: 16px 0; font-family: monospace; font-size: 12px; color: #0F172A; white-space: pre-line; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<header class="header">
    <div class="logo">
        <div class="logo-icon"><i class="fas fa-briefcase"></i></div>
        <span class="logo-text">Internship Platform</span>
        <span class="logo-badge">Company</span>
    </div>
    <div class="header-right">
        <div class="notification-container">
            <div class="notification-bell" onclick="toggleNotifications()">
                <i class="far fa-bell"></i>
                <span class="notification-badge" id="notificationCount">0</span>
            </div>
            <div class="notification-dropdown" id="notificationDropdown">
                <div class="notification-header"><i class="far fa-bell mr-2" style="color:#10b981;"></i>Notifications</div>
                <div class="notification-list" id="notificationList"></div>
            </div>
        </div>
        <div class="user-info">
            <span class="user-name" id="userName">Tech Solutions DZ</span>
            <div class="avatar" id="userAvatar">TS</div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt mr-1"></i> Logout</button>
        </div>
    </div>
</header>

<aside class="sidebar">
    <div class="menu-item active" data-view="dashboard"><i class="fas fa-chart-pie"></i> Dashboard</div>
    <div class="menu-item" data-view="offers"><i class="fas fa-briefcase"></i> My Offers</div>
    <div class="menu-item" data-view="applicants"><i class="fas fa-users"></i> Applicants</div>
    <div class="menu-item" data-view="evaluations"><i class="fas fa-star"></i> Evaluations</div>
    <div class="menu-item" data-view="signature"><i class="fas fa-pen-fancy"></i> Signature</div>
    <div class="menu-item" data-view="notifications"><i class="fas fa-bell"></i> Notifications</div>
    <div class="menu-item" data-view="settings"><i class="fas fa-cog"></i> Settings</div>
</aside>

<main class="main-content" id="mainContent"></main>

<div id="offerModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-plus-circle mr-2" style="color:#10b981;"></i>Propose New Internship</h3>
        <div class="form-group"><label>Internship Title</label><input type="text" id="offerTitle" placeholder="e.g., Frontend Developer"></div>
        <div class="form-group"><label>Duration</label><input type="text" id="offerDuration" placeholder="e.g., 3 months"></div>
        <div class="form-group"><label>Location</label><input type="text" id="offerLocation" placeholder="Algiers, Algeria"></div>
        <div class="form-group"><label>Required Skills</label><textarea id="offerSkills" rows="2" placeholder="React, CSS, Tailwind"></textarea></div>
        <div class="form-group"><label>Description</label><textarea id="offerDesc" rows="3" placeholder="Internship description..."></textarea></div>
        <div class="modal-buttons">
            <button class="btn-primary" onclick="saveOffer()" style="flex:1"><i class="fas fa-paper-plane mr-1"></i> Publish Offer</button>
            <button onclick="closeModal('offerModal')" class="btn-outline">Cancel</button>
        </div>
    </div>
</div>

<div id="evalModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-star mr-2" style="color:#fbbf24;"></i>Evaluate Intern</h3>
        <div class="form-group"><label>Intern Name</label><input type="text" id="evalInternName" readonly></div>
        <div class="form-group"><label>Internship</label><input type="text" id="evalInternship" readonly></div>
        <div class="form-group"><label>Punctuality (1-5)</label><input type="number" id="evalPunctuality" min="1" max="5" value="4"></div>
        <div class="form-group"><label>Quality of Work (1-5)</label><input type="number" id="evalQuality" min="1" max="5" value="4"></div>
        <div class="form-group"><label>Teamwork (1-5)</label><input type="number" id="evalTeamwork" min="1" max="5" value="4"></div>
        <div class="form-group"><label>Comments</label><textarea id="evalComments" rows="3"></textarea></div>
        <input type="hidden" id="evalApplicantEmail" value="">
        <div class="modal-buttons">
            <button class="btn-primary" onclick="submitEvaluation()" style="flex:1">Submit Evaluation</button>
            <button onclick="closeModal('evalModal')" class="btn-outline">Cancel</button>
        </div>
    </div>
</div>

<div id="agreementModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-file-contract mr-2" style="color:#8b5cf6;"></i>Internship Agreement</h3>
        <div id="agreementPreview" class="agreement-preview"></div>
        <div class="modal-buttons">
            <button class="btn-download" onclick="downloadAgreementPdf()" style="flex:1"><i class="fas fa-download mr-1"></i> Download PDF</button>
            <button onclick="closeModal('agreementModal')" class="btn-outline">Close</button>
        </div>
    </div>
</div>

<div id="signConfirmModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-pen-fancy mr-2" style="color:#8b5cf6;"></i>Sign Agreement</h3>
        <div id="signConfirmDetails" class="agreement-preview"></div>
        <div class="form-group"><label>Your Full Name (Digital Signature)</label><input type="text" id="signatoryName" placeholder="Enter your full name to sign"></div>
        <input type="hidden" id="signEvalId" value="">
        <div class="modal-buttons">
            <button class="btn-sign" onclick="confirmAgreementSignature()" style="flex:1"><i class="fas fa-check mr-1"></i> Sign Agreement</button>
            <button onclick="closeModal('signConfirmModal')" class="btn-outline">Cancel</button>
        </div>
    </div>
</div>

<div id="applicantsModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-users mr-2" style="color:#10b981;"></i>Applicants for <span id="applicantsOfferTitle"></span></h3>
        <div id="applicantsListContainer">
            <table class="table-applicants">
                <thead><tr><th>Name</th><th>Email</th><th>Applied Date</th><th>Status</th><th>Action</th></tr></thead>
                <tbody id="applicantsTableBody"></tbody>
            </table>
            <div id="noApplicants" class="empty-state" style="display:none;"><i class="fas fa-user-slash"></i><p>No applicants yet</p></div>
        </div>
        <div class="modal-buttons">
            <button onclick="closeModal('applicantsModal')" class="btn-outline" style="margin-left:auto">Close</button>
        </div>
    </div>
</div>

<script>
    let offers = [];
    let pendingEvaluations = [];
    let completedEvaluations = [];
    let signedAgreements = [];
    let notifications = [];
    let currentAgreementData = null;
    let currentView = 'dashboard';
    let currentApplicantsOfferId = null;

    const sampleApplicants = [
        { name: 'Ahmed Benali', email: 'ahmed@univ-tebessa.dz', applied: '2026-04-10', status: 'pending' },
        { name: 'Sarah Merad', email: 's.merad@esi.dz', applied: '2026-04-11', status: 'interview' },
        { name: 'Mohamed Larbi', email: 'm.larbi@univ-constantine.dz', applied: '2026-04-12', status: 'accepted' },
        { name: 'Amina Khelifi', email: 'a.khelifi@univ-alger.dz', applied: '2026-04-08', status: 'pending' }
    ];

    function loadData() {
        offers = JSON.parse(localStorage.getItem('companyOffers')) || [

    async function saveOffer() {
        const fields = ['offerTitle','offerDuration','offerLocation','offerSkills','offerDesc'];
        const values = fields.map(id => document.getElementById(id).value.trim());
        const user = JSON.parse(localStorage.getItem('currentUser'));
        if (!values[0] || !values[1]) return alert('Title and Duration are required');
        const offerData = { title: values[0], description: `${values[4]} | Skills: ${values[3]} | Loc: ${values[2]} | Duration: ${values[1]}`, statut: 'Active', project: 'IFTMS Project', startDate: new Date().toISOString().split('T')[0], endDate: new Date(Date.now()+7.7e9).toISOString().split('T')[0], companyId: user.id, departmentId: 1 };
        try {
            const res = await fetch('http://localhost:5000/api/add-offer', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(offerData) });
            if (res.ok) { alert('Success! Offer added.'); closeModal('offerModal'); fields.forEach(id => document.getElementById(id).value = ''); renderView('offers'); }
            else alert('Error saving offer');
        } catch(e) { alert('Server offline'); }
    }

    async function viewApplicants(offerId) {
        currentApplicantsOfferId = offerId;
        const tbody = document.getElementById('applicantsTableBody');
        const modal = document.getElementById('applicantsModal');
        document.getElementById('applicantsOfferTitle').textContent = "Checking Applicants...";
        modal.style.display = 'flex';
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;">Loading from Database...</td></tr>';
        try {
            const response = await fetch(`http://localhost:5000/api/applicants/${offerId}`);
            const applicants = await response.json();
            document.getElementById('applicantsOfferTitle').textContent = `Offer ID: ${offerId}`;
            if (applicants.length === 0) { tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:20px;">No applicants yet.</td></tr>'; return; }
            tbody.innerHTML = applicants.map(a => {
                const status = (a.Status || 'pending').toLowerCase();
                const alreadyEvaluated = completedEvaluations.some(e => e.email === a.Email) || pendingEvaluations.some(e => e.email === a.Email);
                let actionHtml = '';
                if (status === 'pending') {
                    actionHtml = `<button class="btn-accept" onclick="acceptApplicant('${a.Email}','${a.FirstName} ${a.LastName}')"><i class="fas fa-check mr-1"></i>Accept</button><button class="btn-reject" onclick="rejectApplicant('${a.Email}')"><i class="fas fa-times mr-1"></i>Reject</button>`;
                } else if (status === 'accepted' && !alreadyEvaluated) {
                    actionHtml = `<button class="eval-btn" onclick="openEvalModal('${a.Email}')"><i class="fas fa-star mr-1"></i>Evaluate</button>`;
                } else if (status === 'accepted' && alreadyEvaluated) {
                    actionHtml = `<span class="status-badge status-evaluated">Evaluated</span>`;
                } else {
                    actionHtml = `<span class="status-badge status-${status}">${a.Status || 'Pending'}</span>`;
                }
                return `<tr><td>${a.FirstName} ${a.LastName}</td><td>${a.Email}</td><td>${new Date(a.RegistrationDate).toLocaleDateString()}</td><td><span class="status-badge status-${status}">${a.Status||'Pending'}</span></td><td style="display:flex;gap:6px;">${actionHtml}</td></tr>`;
            }).join('');
        } catch (error) { tbody.innerHTML = '<tr><td colspan="5" style="color:red;text-align:center;">Error connecting to MySQL.</td></tr>'; }
    }

    function submitEvaluation() {
        const email = document.getElementById('evalApplicantEmail').value;
        const name = document.getElementById('evalInternName').value;
        const internship = document.getElementById('evalInternship').value;
        const p = parseInt(document.getElementById('evalPunctuality').value) || 4;
        const q = parseInt(document.getElementById('evalQuality').value) || 4;
        const t = parseInt(document.getElementById('evalTeamwork').value) || 4;
        const avg = ((p+q+t)/3).toFixed(1);
        pendingEvaluations = pendingEvaluations.filter(e => e.email !== email);
        completedEvaluations.push({ internName: name, email: email, internship: internship, avgScore: avg, date: new Date().toLocaleDateString() });
        saveAll(); closeModal('evalModal');
        addNotification('Evaluation Submitted', `You evaluated ${name} (Score: ${avg}/5).`, 'success');
        renderView(currentView);
    }

    function confirmAgreementSignature() {

    window.rejectApplicant = rejectApplicant;
    window.closeOffer = closeOffer;
    window.openEvalModal = openEvalModal;
    window.submitEvaluation = submitEvaluation;
    window.viewAgreement = viewAgreement;
    window.openSignModal = openSignModal;
    window.confirmAgreementSignature = confirmAgreementSignature;
    window.downloadAgreementPdf = downloadAgreementPdf;
    window.downloadSignedAgreementPdf = downloadSignedAgreementPdf;
    window.switchOfferTab = switchOfferTab;
    window.switchSignatureTab = switchSignatureTab;
    window.closeModal = closeModal;
    window.logout = logout;
    window.markAsRead = markAsRead;
    window.toggleNotifications = toggleNotifications;

    document.addEventListener('click', (e) => {
        const nc = document.querySelector('.notification-container');
        const dd = document.getElementById('notificationDropdown');
        if (nc && !nc.contains(e.target) && dd.classList.contains('show')) dd.classList.remove('show');
    });
    window.onclick = function(event) { if (event.target.classList.contains('modal')) event.target.style.display = 'none'; };
    document.querySelectorAll('.menu-item').forEach(item => { item.addEventListener('click', () => { const v = item.dataset.view; if (v) renderView(v); }); });

    loadData();
    loadNotifications();
    renderView('dashboard');
</script>
</body>
</html>
