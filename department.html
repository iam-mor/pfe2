<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Dashboard · Internship Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #EEF2F6 0%, #E6ECF3 40%, #F4F7FB 100%);
            background-size: 200% 200%;
            animation: gradientShift 20s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
            color: #0F172A;
        }
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes floatBlob {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 35px) scale(0.95); }
        }
        .blob { position: fixed; width: 600px; height: 600px; border-radius: 50%; filter: blur(70px); opacity: 0.15; pointer-events: none; animation: floatBlob 18s infinite ease-in-out; z-index: 0; }
        .blob-1 { background: radial-gradient(circle, rgba(239,68,68,0.5) 0%, rgba(239,68,68,0) 70%); top: -200px; right: -150px; }
        .blob-2 { background: radial-gradient(circle, rgba(139,92,246,0.4) 0%, rgba(139,92,246,0) 70%); bottom: -200px; left: -150px; animation-delay: -9s; }
        .blob-3 { background: radial-gradient(circle, rgba(59,130,246,0.35) 0%, rgba(59,130,246,0) 70%); top: 50%; right: 25%; width: 400px; height: 400px; animation-delay: -14s; }

        .header {
            position: fixed; top: 20px; left: 20px; right: 20px; height: 70px;
            background: rgba(244,247,251,0.8); backdrop-filter: blur(14px); border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center; padding: 0 28px;
            z-index: 100; border: 1px solid rgba(239,68,68,0.25);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03); animation: pulseGlow 4s infinite ease-in-out;
        }
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-color: rgba(239,68,68,0.25); }
            50% { box-shadow: 0 8px 30px rgba(239,68,68,0.35); border-color: rgba(239,68,68,0.5); }
        }

        .logo { display: flex; align-items: center; gap: 8px; }
        .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #ef4444, #8b5cf6); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .logo-icon i { color: white; font-size: 14px; }
        .logo-text { font-size: 20px; font-weight: 700; color: #000; }
        .logo-badge { font-size: 12px; font-weight: 600; color: #ef4444; background: rgba(239,68,68,0.15); padding: 4px 10px; border-radius: 20px; margin-left: 4px; }

        .header-right { display: flex; align-items: center; gap: 18px; }
        .user-info { display: flex; align-items: center; gap: 18px; }
        .user-name { color: #0F172A; font-size: 15px; font-weight: 500; }
        .avatar { width: 44px; height: 44px; background: linear-gradient(135deg, #ef4444, #8b5cf6); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 16px; border: 2px solid rgba(239,68,68,0.2); }
        .logout-btn { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.4); padding: 8px 20px; border-radius: 40px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
        .logout-btn:hover { background: rgba(239,68,68,0.2); }

        .sidebar { position: fixed; top: 114px; left: 20px; bottom: 20px; width: 280px; background: rgba(255,235,238,0.65); backdrop-filter: blur(14px); border-radius: 24px; border: 1px solid rgba(239,68,68,0.25); padding: 24px 12px; z-index: 20; }
        .menu-item { padding: 14px 18px; margin: 6px 0; border-radius: 16px; cursor: pointer; display: flex; align-items: center; gap: 14px; font-size: 15px; font-weight: 500; color: #7f1d1d; transition: all 0.25s; }
        .menu-item i { width: 22px; color: #ef4444; }
        .menu-item:hover { background: rgba(239,68,68,0.12); color: #991b1b; }
        .menu-item.active { background: linear-gradient(135deg, rgba(239,68,68,0.18), rgba(220,38,38,0.12)); color: #b91c1c; border: 1px solid rgba(239,68,68,0.4); }

        .main-content { margin-left: 320px; margin-top: 114px; padding: 10px 30px 40px; position: relative; z-index: 10; }
        .view-container { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 40px; }
        .stat-card { background: rgba(255,255,255,0.65); backdrop-filter: blur(8px); border-radius: 26px; padding: 24px 20px; border: 1px solid rgba(239,68,68,0.2); transition: transform 0.2s, border-color 0.2s; }
        .stat-card:hover { transform: translateY(-4px); border-color: #ef4444; box-shadow: 0 6px 18px rgba(239,68,68,0.1); }
        .stat-label { font-size: 15px; color: #4B5563; margin-bottom: 12px; font-weight: 500; }
        .stat-value { font-size: 42px; font-weight: 800; background: linear-gradient(135deg, #dc2626, #ef4444); -webkit-background-clip: text; background-clip: text; color: transparent; }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .section-title { font-size: 24px; font-weight: 700; color: #0F172A; }

        .tabs { display: flex; gap: 12px; margin-bottom: 28px; border-bottom: 1px solid rgba(239,68,68,0.15); padding-bottom: 8px; flex-wrap: wrap; }
        .tab { padding: 10px 24px; background: transparent; border: none; color: #64748b; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 40px; transition: all 0.3s; }
        .tab:hover { background: rgba(239,68,68,0.08); color: #0F172A; }
        .tab.active { background: rgba(239,68,68,0.15); color: #ef4444; }
        .inner-tab-content { display: none; }
        .inner-tab-content.active { display: block; animation: fadeIn 0.3s ease; }

        .table-container { background: rgba(255,255,255,0.65); backdrop-filter: blur(8px); border-radius: 28px; border: 1px solid rgba(239,68,68,0.2); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { text-align: left; padding: 18px 22px; background: rgba(239,68,68,0.05); font-size: 13px; font-weight: 600; color: #4B5563; border-bottom: 1px solid rgba(239,68,68,0.15); }
        td { padding: 18px 22px; font-size: 15px; color: #0F172A; border-bottom: 1px solid rgba(239,68,68,0.1); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(239,68,68,0.03); }

        .status-badge { display: inline-block; padding: 5px 16px; border-radius: 40px; font-size: 13px; font-weight: 600; }
        .status-pending { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }
        .status-accepted { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }
        .status-approved { background: #DBEAFE; color: #1E40AF; border: 1px solid #93C5FD; }
        .status-evaluation_submitted { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }
        .status-completed { background: #DCFCE7; color: #166534; border: 1px solid #86EFAC; }
        .status-verified { background: #DCFCE7; color: #166534; border: 1px solid #86EFAC; }
        .status-rejected { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }
        .status-active { background: #DBEAFE; color: #1E40AF; border: 1px solid #93C5FD; }

        .btn-approve { background: rgba(34,197,94,0.15); color: #166534; border: 1px solid rgba(34,197,94,0.4); padding: 6px 16px; border-radius: 40px; font-size: 12px; cursor: pointer; margin-right: 8px; transition: all 0.2s; }
        .btn-approve:hover { background: rgba(34,197,94,0.3); }
        .btn-reject { background: rgba(239,68,68,0.15); color: #991B1B; border: 1px solid rgba(239,68,68,0.4); padding: 6px 16px; border-radius: 40px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .btn-reject:hover { background: rgba(239,68,68,0.3); }
        .btn-outline { background: transparent; border: 1px solid rgba(239,68,68,0.4); color: #ef4444; padding: 6px 16px; border-radius: 40px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .btn-outline:hover { background: rgba(239,68,68,0.1); }
        .btn-primary { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; border: none; padding: 10px 20px; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary:hover { transform: translateY(-1px); }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background: rgba(255,255,255,0.9); backdrop-filter: blur(16px); border-radius: 32px; padding: 32px; width: 600px; max-width: 90%; border: 1px solid rgba(239,68,68,0.25); box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-height: 80vh; overflow-y: auto; }
        .modal-content h3 { color: #0F172A; font-size: 24px; margin-bottom: 20px; }
        .company-info-detail { background: rgba(255,255,255,0.6); border-radius: 16px; padding: 16px; margin: 16px 0; }
        .evaluation-preview { background: rgba(248,250,252,0.9); border-radius: 16px; padding: 16px; margin: 16px 0; }
        .contract-preview { background: rgba(248,250,252,0.9); border-radius: 16px; padding: 20px; margin: 20px 0; font-family: monospace; font-size: 12px; color: #0F172A; white-space: pre-line; max-height: 300px; overflow-y: auto; }

        .empty-state { text-align: center; padding: 60px; color: #64748b; }
        .empty-state i { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }

        .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: transparent; color: #4B5563; border: 1px solid rgba(239,68,68,0.3); border-radius: 40px; cursor: pointer; margin-bottom: 24px; transition: 0.2s; font-size: 14px; font-weight: 500; }
        .back-btn:hover { background: rgba(239,68,68,0.05); color: #0F172A; }

        .file-upload-label { cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .file-upload-label input { display: none; }

        .modal-content::-webkit-scrollbar, .table-container::-webkit-scrollbar { width: 8px; height: 8px; }
        .modal-content::-webkit-scrollbar-track, .table-container::-webkit-scrollbar-track { background: rgba(239,68,68,0.05); border-radius: 10px; }
        .modal-content::-webkit-scrollbar-thumb, .table-container::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #ef4444, #dc2626); border-radius: 10px; border: 2px solid rgba(255,255,255,0.9); }
        .modal-content::-webkit-scrollbar-thumb:hover, .table-container::-webkit-scrollbar-thumb:hover { background: #b91c1c; }
    </style>
</head>
<body>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<header class="header">
    <div class="logo">
        <div class="logo-icon"><i class="fas fa-briefcase"></i></div>
        <span class="logo-text">Internship Platform</span>
        <span class="logo-badge">Department</span>
    </div>
    <div class="header-right">
        <div class="user-info">
            <span class="user-name" id="adminName">Department Admin</span>
            <div class="avatar">DA</div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt mr-1"></i> Logout</button>
        </div>
    </div>
</header>

<aside class="sidebar">
    <div class="menu-item active" data-view="dashboard"><i class="fas fa-chart-pie"></i> Dashboard</div>
    <div class="menu-item" data-view="companies"><i class="fas fa-building"></i> Company Verifications</div>
    <div class="menu-item" data-view="validations"><i class="fas fa-clipboard-check"></i> Internship Validations</div>
    <div class="menu-item" data-view="students"><i class="fas fa-users"></i> Students Management</div>
</aside>

<main class="main-content" id="mainContent"></main>

<!-- Company Details Modal -->
<div id="companyModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-building mr-2" style="color:#ef4444;"></i>Company Details</h3>
        <div id="companyDetails" class="company-info-detail"></div>
        <div style="display:flex;gap:12px;">
            <button id="verifyCompanyBtn" class="btn-approve" style="flex:1"><i class="fas fa-check mr-1"></i> Accept</button>
            <button id="rejectCompanyBtn" class="btn-reject" style="flex:1"><i class="fas fa-times mr-1"></i> Reject</button>
            <button onclick="closeModal('companyModal')" class="btn-outline">Close</button>
        </div>
    </div>
</div>

<!-- Agreement Modal -->
<div id="contractModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-file-contract mr-2" style="color:#ef4444;"></i>Internship Agreement</h3>
        <div id="contractPreview" class="contract-preview"></div>
        <div style="display:flex;gap:12px;margin-top:20px;">
            <button class="btn-approve" onclick="downloadContractPdf()" style="flex:1"><i class="fas fa-file-pdf mr-1"></i> Download PDF</button>
            <button onclick="closeModal('contractModal')" class="btn-outline">Close</button>
        </div>
    </div>
</div>

<!-- Sign & Complete Modal -->
<div id="finalizeModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-clipboard-check mr-2" style="color:#ef4444;"></i>Sign & Complete Internship</h3>
        <div id="finalizeDetails" class="evaluation-preview"></div>
        <div style="display:flex;gap:12px;margin-top:20px;">
            <button class="btn-approve" onclick="finalizeInternship()" style="flex:1"><i class="fas fa-check-double mr-1"></i> Sign & Complete</button>
            <button class="btn-outline" onclick="closeModal('finalizeModal')">Cancel</button>
        </div>
    </div>
</div>

<script>
    // ==================== DATA ====================
    let currentCompanyId = null;
    let currentContract = null;
    let currentFinalizeAppId = null;
    let currentView = 'dashboard';

    const defaultCompanies = [
        { id: 'c1', companyName: 'Tech Solutions DZ', email: 'tech@techsolutions.dz', registrationNumber: 'RC-12345', phone: '+213 555 111 222', sector: 'Software & AI', address: 'Algiers, Algeria', website: 'www.techsolutions.dz', description: 'Leading software development company.', registeredDate: '2026-04-01', status: 'pending_verification' },
        { id: 'c2', companyName: 'Digital Innovators', email: 'info@digitalinnovators.dz', registrationNumber: 'RC-67890', phone: '+213 555 333 444', sector: 'Digital Marketing', address: 'Oran, Algeria', website: 'www.digitalinnovators.dz', description: 'Digital marketing agency.', registeredDate: '2026-04-05', status: 'verified', verifiedDate: '2026-04-10' },
        { id: 'c3', companyName: 'Cloud Systems DZ', email: 'cloud@cloudsystems.dz', registrationNumber: 'RC-11223', phone: '+213 555 555 666', sector: 'Cloud Computing', address: 'Constantine, Algeria', website: 'www.cloudsystems.dz', description: 'Cloud infrastructure provider.', registeredDate: '2026-04-08', status: 'pending_verification' }
    ];

    const defaultApplications = [
        { id: '5001', studentName: 'Ahmed Benali', company: 'Tech Solutions DZ', internshipTitle: 'Frontend Developer Intern', date: '2026-04-10', status: 'accepted' },
        { id: '5002', studentName: 'Lina Mansouri', company: 'AI Analytics Pro', internshipTitle: 'Data Science Intern', date: '2026-04-12', status: 'accepted' },
        { id: '5003', studentName: 'Ahmed Benali', company: 'Digital Innovators', internshipTitle: 'Digital Marketing Intern', date: '2026-04-08', status: 'approved' },
        { id: '5004', studentName: 'Karim Said', company: 'Tech Solutions DZ', internshipTitle: 'Backend Developer Intern', date: '2026-05-01', status: 'evaluation_submitted', evaluation: { punctuality: 5, quality: 4, teamwork: 4, initiative: 5, comments: 'Excellent work, very proactive and eager to learn.' }, diplomaSignedByCompany: true, diplomaSignedDate: '2026-07-20' }
    ];

    const defaultStudents = [
        { firstName: 'Ahmed', lastName: 'Benali', email: 'ahmed@univ-tebessa.dz', degree: 'Bachelor', specialization: 'Computer Science', registeredDate: '2026-03-01' },
        { firstName: 'Lina', lastName: 'Mansouri', email: 'lina@univ-tebessa.dz', degree: 'Master', specialization: 'Software Engineering', registeredDate: '2026-03-10' },
        { firstName: 'Karim', lastName: 'Said', email: 'karim@univ-tebessa.dz', degree: 'Bachelor', specialization: 'Information Technology', registeredDate: '2026-03-15' }
    ];

    function loadCompanies() { return JSON.parse(localStorage.getItem('registeredCompanies')) || defaultCompanies; }
    function saveCompanies(c) { localStorage.setItem('registeredCompanies', JSON.stringify(c)); }
    function loadApplications() { return JSON.parse(localStorage.getItem('applications')) || defaultApplications; }
    function saveApplications(a) { localStorage.setItem('applications', JSON.stringify(a)); }
    function loadStudents() { return JSON.parse(localStorage.getItem('registeredStudents')) || defaultStudents; }

    // ==================== RENDERING ====================
    function renderView(view) {
        currentView = view;
        document.querySelectorAll('.menu-item').forEach(i => i.classList.toggle('active', i.dataset.view === view));
        const container = document.getElementById('mainContent');

        switch(view) {
            case 'dashboard': renderDashboard(container); break;
            case 'companies': renderCompaniesView(container); break;
            case 'validations': renderValidationsView(container); break;
            case 'students': renderStudentsView(container); break;
            default: renderDashboard(container);
        }

        if (view !== 'dashboard') {
            const vc = container.querySelector('.view-container');
            if (vc && !vc.querySelector('.back-btn')) {
                vc.insertAdjacentHTML('afterbegin',
                    '<button class="back-btn" onclick="renderView(\'dashboard\')"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>'
                );
            }
        }
    }

    // ==================== DASHBOARD ====================
    function renderDashboard(container) {
        const companies = loadCompanies();
        const pendingCompanies = companies.filter(c => c.status === 'pending_verification');
        const apps = loadApplications();
        const evalReview = apps.filter(a => a.status === 'evaluation_submitted');
        const pendingAgreements = apps.filter(a => a.status === 'accepted');

        container.innerHTML = `
        <div class="view-container">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label"><i class="fas fa-building mr-1" style="color:#ef4444;"></i> Total Companies</div>
                    <div class="stat-value">${companies.length}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label"><i class="fas fa-clock mr-1"></i> Pending Verifications</div>
                    <div class="stat-value">${pendingCompanies.length}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label"><i class="fas fa-file-contract mr-1"></i> Pending Agreements</div>
                    <div class="stat-value">${pendingAgreements.length}</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label"><i class="fas fa-check-double mr-1"></i> Signature</div>
                    <div class="stat-value">${evalReview.length}</div>
                </div>
            </div>

            <div class="section-header">
                <h2 class="section-title"><i class="fas fa-exclamation-triangle mr-2" style="color:#ef4444;"></i> Pending Company Verifications</h2>
                <button class="btn-outline" onclick="renderView('companies')">View All</button>
            </div>
            <div class="table-container">${renderPendingCompaniesTable(pendingCompanies)}</div>

            <div class="section-header" style="margin-top:40px;">
                <h2 class="section-title"><i class="fas fa-history mr-2"></i> Recent Activity</h2>
            </div>
            <div class="table-container">${renderActivityTable()}</div>
        </div>`;
    }

    function renderPendingCompaniesTable(pending) {
        if (!pending.length) return '<div class="empty-state"><i class="fas fa-check-circle"></i><p>No pending company verifications</p></div>';
        let html = '<table><thead><tr><th>Company</th><th>Email</th><th>Sector</th><th>Address</th><th>Registered</th><th>Action</th></tr></thead><tbody>';
        pending.forEach(c => {
            html += `<tr>
                <td><strong>${c.companyName}</strong></td>
                <td>${c.email}</td>
                <td>${c.sector || 'N/A'}</td>
                <td>${c.address || 'N/A'}</td>
                <td>${new Date(c.registeredDate).toLocaleDateString()}</td>
                <td><button class="btn-outline" onclick="viewCompanyDetails('${c.id}')"><i class="fas fa-eye mr-1"></i> Review</button></td>
            </tr>`;
        });
        html += '</tbody></table>';
        return html;
    }

    function renderActivityTable() {
        const companies = loadCompanies();
        const apps = loadApplications();
        const activities = [];

        companies.forEach(c => {
            activities.push({
                type: 'company',
                name: c.companyName,
                action: c.status === 'verified' ? 'verified' : c.status === 'rejected' ? 'rejected' : 'pending verification',
                date: c.registeredDate,
                status: c.status
            });
        });

        apps.forEach(a => {
            activities.push({
                type: 'application',
                name: a.studentName,
                action: `${a.internshipTitle} (${a.status.replace(/_/g, ' ')})`,
                date: a.date,
                status: a.status
            });
        });

        activities.sort((a, b) => new Date(b.date) - new Date(a.date));
        const recent = activities.slice(0, 10);

        if (!recent.length) return '<div class="empty-state"><i class="fas fa-inbox"></i><p>No recent activity</p></div>';

        let html = '<table><thead><tr><th>Date</th><th>Activity</th><th>Status</th></tr></thead><tbody>';
        const statusMap = {
            'pending_verification': 'status-pending',
            'verified': 'status-verified',
            'rejected': 'status-rejected',
            'accepted': 'status-accepted',
            'approved': 'status-approved',
            'evaluation_submitted': 'status-evaluation_submitted',
            'completed': 'status-completed'
        };

        recent.forEach(act => {
            html += `<tr>
                <td>${new Date(act.date).toLocaleDateString()}</td>
                <td>${act.type === 'company' ? '🏢 ' + act.name + ' ' + act.action : '🎓 ' + act.name + ' - ' + act.action}</td>
                <td><span class="status-badge ${statusMap[act.status] || 'status-pending'}">${act.status.replace(/_/g, ' ')}</span></td>
            </tr>`;
        });

        html += '</tbody></table>';
        return html;
    }

    // ==================== COMPANY VERIFICATIONS ====================
    function renderCompaniesView(container) {
        const companies = loadCompanies();
        const pending = companies.filter(c => c.status === 'pending_verification');
        const verified = companies.filter(c => c.status === 'verified');
        const rejected = companies.filter(c => c.status === 'rejected');

        container.innerHTML = `
        <div class="view-container">
            <div class="section-header">
                <h2 class="section-title"><i class="fas fa-building mr-2"></i> Company Verifications</h2>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="switchTab('pendingCompanies', this)">Pending (${pending.length})</button>
                <button class="tab" onclick="switchTab('verifiedCompanies', this)">Verified (${verified.length})</button>
                <button class="tab" onclick="switchTab('rejectedCompanies', this)">Rejected (${rejected.length})</button>
            </div>
            <div id="pendingCompaniesTab" class="inner-tab-content active">
                <div class="table-container">${renderFullPendingTable(pending)}</div>
            </div>
            <div id="verifiedCompaniesTab" class="inner-tab-content">
                <div class="table-container">${renderVerifiedTable(verified)}</div>
            </div>
            <div id="rejectedCompaniesTab" class="inner-tab-content">
                <div class="table-container">${renderRejectedTable(rejected)}</div>
            </div>
        </div>`;
    }

    function renderFullPendingTable(pending) {
        if (!pending.length) return '<div class="empty-state"><i class="fas fa-check-circle"></i><p>No pending verifications</p></div>';
        let html = '<table><thead><tr><th>Company</th><th>Email</th><th>Phone</th><th>Address</th><th>Sector</th><th>Registered</th><th>Action</th></tr></thead><tbody>';
        pending.forEach(c => {
            html += `<tr>
                <td><strong>${c.companyName}</strong></td>
                <td>${c.email}</td>
                <td>${c.phone || 'N/A'}</td>
                <td>${c.address || 'N/A'}</td>
                <td>${c.sector || 'N/A'}</td>
                <td>${new Date(c.registeredDate).toLocaleDateString()}</td>
                <td><button class="btn-outline" onclick="viewCompanyDetails('${c.id}')"><i class="fas fa-eye mr-1"></i> Review</button></td>
            </tr>`;
        });
        html += '</tbody></table>';
        return html;
    }

    function renderVerifiedTable(verified) {
        if (!verified.length) return '<div class="empty-state"><i class="fas fa-building"></i><p>No verified companies</p></div>';
        let html = '<table><thead><tr><th>Company</th><th>Email</th><th>Sector</th><th>Verified Date</th></tr></thead><tbody>';
        verified.forEach(c => {
            html += `<tr>
                <td><strong>${c.companyName}</strong></td>
                <td>${c.email}</td>
                <td>${c.sector || 'N/A'}</td>
                <td>${c.verifiedDate ? new Date(c.verifiedDate).toLocaleDateString() : 'N/A'}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        return html;
    }

    function renderRejectedTable(rejected) {
        if (!rejected.length) return '<div class="empty-state"><i class="fas fa-ban"></i><p>No rejected companies</p></div>';
        let html = '<table><thead><tr><th>Company</th><th>Email</th><th>Sector</th><th>Registered</th></tr></thead><tbody>';
        rejected.forEach(c => {
            html += `<tr>
                <td><strong>${c.companyName}</strong></td>
                <td>${c.email}</td>
                <td>${c.sector || 'N/A'}</td>
                <td>${new Date(c.registeredDate).toLocaleDateString()}</td>
            </tr>`;
        });
        html += '</tbody></table>';
        return html;
    }

    // ==================== INTERNSHIP VALIDATIONS ====================
    function renderValidationsView(container) {
        const apps = loadApplications();
        const agreements = apps.filter(a => a.status === 'accepted');
        const inProgress = apps.filter(a => a.status === 'approved' || a.status === 'in_progress');
        const signature = apps.filter(a => a.status === 'evaluation_submitted');
        const completed = apps.filter(a => a.status === 'completed');

        container.innerHTML = `
        <div class="view-container">
            <div class="section-header">
                <h2 class="section-title"><i class="fas fa-clipboard-check mr-2"></i> Internship Validations</h2>
                <label class="btn-outline file-upload-label">
                    <i class="fas fa-upload"></i> Import from Excel
                    <input type="file" id="excelFileInput" accept=".xlsx,.xls,.csv" onchange="handleExcelImport(event)">
                </label>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="switchValidationTab('agreements', this)">Agreements (${agreements.length})</button>
                <button class="tab" onclick="switchValidationTab('inprogress', this)">In Progress (${inProgress.length})</button>
                <button class="tab" onclick="switchValidationTab('signature', this)">Signature (${signature.length})</button>
                <button class="tab" onclick="switchValidationTab('completed', this)">Completed (${completed.length})</button>
            </div>
            <div id="agreementsValidTab" class="inner-tab-content active">
                <div class="table-container">${renderAgreementsTab(agreements)}</div>
            </div>
            <div id="inprogressValidTab" class="inner-tab-content">
                <div class="table-container">${renderInProgressTable(inProgress)}</div>
            </div>
            <div id="signatureValidTab" class="inner-tab-content">
                <div class="table-container">${renderSignatureTable(signature)}</div>
            </div>
            <div id="completedValidTab" class="inner-tab-content">
                <div class="table-container">${renderCompletedTable(completed)}</div>
            </div>
        </div>`;
    }

    function renderAgreementsTab(list) {
        if (!list.length) return '<div class="empty-state"><i class="fas fa-file-contract"></i><p>No pending agreements</p></div>';
        let html = '<table><thead><tr><th>Student</th><th>Company</th><th>Internship</th><th>Date</th><th>Status</th><th>Action</th></tr></thead><tbody>';
        list.forEach(a => {
            html += `<tr>
                <td><strong>${a.studentName}</strong></td>
                <td>${a.company}</td>
                <td>${a.internshipTitle}</td>
                <td>${a.date}</td>
                <td><span class="status-badge status-accepted">Pending Approval</span></td>
                <td>
                    <button class="btn-outline" onclick="showContract('${a.studentName}','${a.company}','${a.internshipTitle}')"><i class="fas fa-eye mr-1"></i> View</button>
                    <button class="btn-approve" onclick="validateAgreement('${a.id}')"><i class="fas fa-check mr-1"></i> Approve</button>
                </td>
            </tr>`;
        });
        html += '</tbody></table>';
        return html;
    }

    function renderInProgressTable(list) {
        if (!list.length) return '<div class="empty-state"><i class="fas fa-spinner"></i><p>No active internships</p></div>';
        let html = '<table><thead><tr><th>Student</th><th>Company</th><th>Internship</th><th>Status</th></tr></thead><tbody>';
        list.forEach(a => {
            html += `<tr>
                <td><strong>${a.studentName}</strong></td>
                <td>${a.company}</td>
                <td>${a.internshipTitle}</td>
                <td><span class="status-badge status-active">Active</span></td>
            </tr>`;
        });
        html += '</tbody></table>';
        return html;
    }

    function renderSignatureTable(list) {
        if (!list.length) return '<div class="empty-state"><i class="fas fa-signature"></i><p>No evaluations awaiting signature</p></div>';
        let html = '<table><thead><tr><th>Student</th><th>Company</th><th>Internship</th><th>Company Signed</th><th>Action</th></tr></thead><tbody>';
        list.forEach(a => {
            const cs = a.diplomaSignedByCompany
                ? '<span class="status-badge status-verified">✓ Signed</span>'
                : '<span class="status-badge status-pending">Pending</span>';
            html += `<tr>
                <td><strong>${a.studentName}</strong></td>
                <td>${a.company}</td>
                <td>${a.internshipTitle}</td>
                <td>${cs}</td>
                <td>
                    <button class="btn-approve" onclick="openFinalizeModal('${a.id}')"><i class="fas fa-check-double mr-1"></i> Sign & Complete</button>
                </td>
            </tr>`;
        });
        html += '</tbody></table>';
        return html;
    }

    function renderCompletedTable(list) {
        if (!list.length) return '<div class="empty-state"><i class="fas fa-check-double"></i><p>No completed internships</p></div>';
        let html = '<table><thead><tr><th>Student</th><th>Company</th><th>Internship</th><th>Action</th></tr></thead><tbody>';
        list.forEach(a => {
            html += `<tr>
                <td><strong>${a.studentName}</strong></td>
                <td>${a.company}</td>
                <td>${a.internshipTitle}</td>
                <td>
                    <button class="btn-outline" onclick="previewCertificate('${a.studentName}','${a.company}','${a.internshipTitle}')"><i class="fas fa-eye mr-1"></i> View</button>
                    <button class="btn-approve" onclick="downloadCompletionPdf('${a.studentName}','${a.company}','${a.internshipTitle}')"><i class="fas fa-download mr-1"></i> Download</button>
                </td>
            </tr>`;
        });
        html += '</tbody></table>';
        return html;
    }

    // ==================== MODALS & ACTIONS ====================
    function openFinalizeModal(appId) {
        currentFinalizeAppId = appId;
        const apps = loadApplications();
        const app = apps.find(a => a.id == appId);
        if (!app) return;

        const e = app.evaluation || {};
        const total = (e.punctuality || 0) + (e.quality || 0) + (e.teamwork || 0) + (e.initiative || 0);
        const cs = app.diplomaSignedByCompany ? '✓ Signed' : '✗ Not yet signed';

        document.getElementById('finalizeDetails').innerHTML = `
            <p><strong>Student:</strong> ${app.studentName}</p>
            <p><strong>Company:</strong> ${app.company}</p>
            <p><strong>Internship:</strong> ${app.internshipTitle}</p>
            <p><strong>Punctuality:</strong> ${e.punctuality || 'N/A'}/5</p>
            <p><strong>Quality of Work:</strong> ${e.quality || 'N/A'}/5</p>
            <p><strong>Teamwork:</strong> ${e.teamwork || 'N/A'}/5</p>
            <p><strong>Initiative:</strong> ${e.initiative || 'N/A'}/5</p>
            <p><strong>Total Score:</strong> ${total}/20</p>
            <p><strong>Comments:</strong> ${e.comments || 'None'}</p>
            <p><strong>Company Signature:</strong> ${cs}</p>
            <p style="margin-top:12px;color:#4B5563;">Your signature will complete this internship and generate the final certificate.</p>
        `;
        document.getElementById('finalizeModal').style.display = 'flex';
    }

    function finalizeInternship() {
        let apps = loadApplications();
        const idx = apps.findIndex(a => a.id == currentFinalizeAppId);
        if (idx !== -1) {
            apps[idx].status = 'completed';
            apps[idx].departmentSigned = true;
            apps[idx].departmentSignedDate = new Date().toISOString().slice(0, 10);
            apps[idx].certificateGenerated = true;
            saveApplications(apps);
            closeModal('finalizeModal');

            const app = apps[idx];
            const e = app.evaluation || {};
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(16);
            doc.text('INTERNSHIP COMPLETION CERTIFICATE', 105, 20, { align: 'center' });
            doc.setFontSize(12);
            doc.setFont('helvetica', 'normal');
            doc.text(`This is to certify that ${app.studentName}`, 105, 50, { align: 'center' });
            doc.text(`has successfully completed: ${app.internshipTitle} at ${app.company}`, 105, 60, { align: 'center' });
            const total = (e.punctuality || 0) + (e.quality || 0) + (e.teamwork || 0) + (e.initiative || 0);
            doc.text(`Evaluation: ${total}/20`, 105, 75, { align: 'center' });
            doc.text(`Date: ${new Date().toLocaleDateString()}`, 105, 90, { align: 'center' });
            doc.text('Department Head: ___________________ (Signed)', 20, 120);
            doc.text(app.diplomaSignedByCompany ? 'Company Representative: ___________________ (Signed)' : 'Company Representative: ___________________ (Pending)', 130, 120);
            doc.save(`Certificate_${app.studentName.replace(/\s/g, '_')}.pdf`);

            alert('✅ Internship signed, completed, and certificate generated.');
            renderView('validations');
        }
    }

    function validateAgreement(appId) {
        let apps = loadApplications();
        const idx = apps.findIndex(a => a.id == appId);
        if (idx !== -1) {
            apps[idx].agreementValidated = true;
            apps[idx].status = 'approved';
            apps[idx].agreementValidatedDate = new Date().toISOString().slice(0, 10);
            saveApplications(apps);
            alert('✅ Agreement approved. Internship is now active.');
            renderView('validations');
        }
    }

    function previewCertificate(student, company, internship) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont('helvetica', 'bold');
        doc.setFontSize(16);
        doc.text('INTERNSHIP COMPLETION CERTIFICATE', 105, 20, { align: 'center' });
        doc.setFontSize(12);
        doc.setFont('helvetica', 'normal');
        doc.text(`This is to certify that ${student}`, 105, 50, { align: 'center' });
        doc.text(`has successfully completed: ${internship} at ${company}`, 105, 60, { align: 'center' });
        doc.text(`Date: ${new Date().toLocaleDateString()}`, 105, 80, { align: 'center' });
        doc.text('Department Head: ___________________ (Signed)', 20, 110);
        doc.text('Company Representative: ___________________ (Signed)', 130, 110);

        const blob = doc.output('blob');
        const url = URL.createObjectURL(blob);

        document.getElementById('contractPreview').innerHTML = `
            <p style="margin-bottom:16px;"><strong>Certificate Preview</strong></p>
            <p>Student: ${student}</p>
            <p>Company: ${company}</p>
            <p>Internship: ${internship}</p>
            <p style="margin-top:12px;color:#4B5563;">Both signatures are present on this certificate.</p>
            <iframe src="${url}" width="100%" height="400px" style="border:none;margin-top:16px;border-radius:12px;"></iframe>
        `;
        document.getElementById('contractModal').style.display = 'flex';
    }

    // ==================== STUDENTS ====================
    function renderStudentsView(container) {
        const students = loadStudents();
        container.innerHTML = `
        <div class="view-container">
            <div class="section-header">
                <h2 class="section-title"><i class="fas fa-users mr-2"></i> Students Management</h2>
                <span>${students.length} students</span>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Degree</th>
                            <th>Specialization</th>
                            <th>Registered</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${students.map(s => `
                            <tr>
                                <td><strong>${s.firstName} ${s.lastName}</strong></td>
                                <td>${s.email}</td>
                                <td>${s.degree || 'N/A'}</td>
                                <td>${s.specialization || 'N/A'}</td>
                                <td>${new Date(s.registeredDate).toLocaleDateString()}</td>
                                <td><span class="status-badge status-active">Active</span></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        </div>`;
    }

    // ==================== PDF FUNCTIONS ====================
    window.downloadContractPdf = function() {
        if (!currentContract) return;
        const { student, company, internship } = currentContract;
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont('helvetica', 'bold'); doc.setFontSize(16);
        doc.text('INTERNSHIP AGREEMENT', 105, 20, { align: 'center' });
        doc.setFontSize(11); doc.setFont('helvetica', 'normal');
        doc.text(`Date: ${new Date().toLocaleDateString()}`, 20, 35);
        doc.text('Between: University Echahid Cheikh Larbi Tebessi - Tebessa', 20, 45);
        doc.text(`Student: ${student}`, 20, 55);
        doc.text(`Company: ${company}`, 20, 65);
        doc.text(`Internship: ${internship}`, 20, 75);
        doc.text('Terms: 3 months, evaluation required.', 20, 90);
        doc.text('University Representative ___________________', 20, 130);
        doc.text('Company Representative ___________________', 130, 130);
        doc.save(`Agreement_${student.replace(/\s/g, '_')}.pdf`);
    };

    window.downloadCompletionPdf = function(student, company, internship) {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        doc.setFont('helvetica', 'bold'); doc.setFontSize(16);
        doc.text('CERTIFICATE OF INTERNSHIP COMPLETION', 105, 20, { align: 'center' });
        doc.setFontSize(12); doc.setFont('helvetica', 'normal');
        doc.text(`This is to certify that ${student}`, 105, 50, { align: 'center' });
        doc.text(`has successfully completed: ${internship} at ${company}`, 105, 60, { align: 'center' });
        doc.text(`Date: ${new Date().toLocaleDateString()}`, 105, 80, { align: 'center' });
        doc.text('Department Head: ___________________ (Signed)', 20, 110);
        doc.text('Company Representative: ___________________', 130, 110);
        doc.save(`Certificate_${student.replace(/\s/g, '_')}.pdf`);
    };

    // ==================== SHARED FUNCTIONS ====================
    window.viewCompanyDetails = function(companyId) {
        currentCompanyId = companyId;
        const company = loadCompanies().find(c => c.id === companyId);
        if (company) {
            document.getElementById('companyDetails').innerHTML = `
                <p><strong>${company.companyName}</strong></p>
                <p>Email: ${company.email}</p>
                <p>Phone: ${company.phone || 'N/A'}</p>
                <p>Address: ${company.address || 'N/A'}</p>
                <p>Sector: ${company.sector || 'N/A'}</p>
            `;
            document.getElementById('companyModal').style.display = 'flex';
        }
    };

    window.verifyCompany = function() {
        if (currentCompanyId) {
            let companies = loadCompanies();
            const idx = companies.findIndex(c => c.id === currentCompanyId);
            if (idx !== -1) {
                companies[idx].status = 'verified';
                companies[idx].verifiedDate = new Date().toISOString();
                saveCompanies(companies);
                closeModal('companyModal');
                renderView(currentView);
            }
        }
    };

    window.rejectCompany = function() {
        if (currentCompanyId) {
            let companies = loadCompanies();
            const idx = companies.findIndex(c => c.id === currentCompanyId);
            if (idx !== -1) {
                companies[idx].status = 'rejected';
                saveCompanies(companies);
                closeModal('companyModal');
                renderView(currentView);
            }
        }
    };

    window.showContract = function(student, company, internship) {
        currentContract = { student, company, internship };
        document.getElementById('contractPreview').innerHTML = `INTERNSHIP AGREEMENT\n\nStudent: ${student}\nCompany: ${company}\nPosition: ${internship}`;
        document.getElementById('contractModal').style.display = 'flex';
    };

    window.closeModal = function(id) {
        document.getElementById(id).style.display = 'none';
    };

    window.logout = function() {
        if (confirm('Are you sure you want to logout?')) {
            localStorage.removeItem('currentUser');
            window.location.href = 'login.html';
        }
    };

    window.onclick = function(event) {
        if (event.target.classList.contains('modal')) {
            event.target.style.display = 'none';
        }
    };

    // ==================== TAB SWITCHING ====================
    window.switchTab = function(tabName, btn) {
        document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
        if (btn) btn.classList.add('active');
        document.querySelectorAll('.inner-tab-content').forEach(c => c.classList.remove('active'));
        const target = document.getElementById(`${tabName}Tab`);
        if (target) target.classList.add('active');
    };

    window.switchValidationTab = function(tabName, btn) {
        document.querySelectorAll('.tabs .tab').forEach(t => t.classList.remove('active'));
        if (btn) btn.classList.add('active');
        document.querySelectorAll('.inner-tab-content').forEach(c => c.classList.remove('active'));
        const target = document.getElementById(`${tabName}ValidTab`);
        if (target) target.classList.add('active');
    };

    // ==================== INITIALIZATION ====================
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', () => {
            const view = item.dataset.view;
            if (view) renderView(view);
        });
    });

    document.getElementById('verifyCompanyBtn').onclick = verifyCompany;
    document.getElementById('rejectCompanyBtn').onclick = rejectCompany;

    window.openFinalizeModal = openFinalizeModal;
    window.finalizeInternship = finalizeInternship;
    window.validateAgreement = validateAgreement;
    window.previewCertificate = previewCertificate;

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('adminName').textContent = 'Department Admin';
        document.querySelector('.avatar').textContent = 'DA';
    });

    renderView('dashboard');
</script>
</body>
</html>
