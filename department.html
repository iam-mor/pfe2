<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Dashboard · Internship Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #EEF2F6 0%, #E6ECF3 40%, #F4F7FB 100%);
            background-size: 200% 200%;
            animation: gradientShift 20s ease infinite;
            min-height: 100vh;
            overflow-x: hidden;
            color: #0F172A;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatBlob {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(40px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 35px) scale(0.95); }
        }

        .blob { position: fixed; width: 600px; height: 600px; border-radius: 50%; filter: blur(70px); opacity: 0.15; pointer-events: none; animation: floatBlob 18s infinite ease-in-out; z-index: 0; }
        .blob-1 { background: radial-gradient(circle, rgba(239,68,68,0.5) 0%, rgba(239,68,68,0) 70%); top: -200px; right: -150px; }
        .blob-2 { background: radial-gradient(circle, rgba(139,92,246,0.4) 0%, rgba(139,92,246,0) 70%); bottom: -200px; left: -150px; animation-delay: -9s; }
        .blob-3 { background: radial-gradient(circle, rgba(59,130,246,0.35) 0%, rgba(59,130,246,0) 70%); top: 50%; right: 25%; width: 400px; height: 400px; animation-delay: -14s; }

        .header {
            position: fixed; top: 20px; left: 20px; right: 20px; height: 70px;
            background: rgba(244,247,251,0.8); backdrop-filter: blur(14px); border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center; padding: 0 28px;
            z-index: 100; border: 1px solid rgba(239,68,68,0.25);
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            animation: pulseGlow 4s infinite ease-in-out;
        }

        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 4px 15px rgba(0,0,0,0.03); border-color: rgba(239,68,68,0.25); }
            50% { box-shadow: 0 8px 30px rgba(239,68,68,0.35); border-color: rgba(239,68,68,0.5); }
        }

        .logo { display: flex; align-items: center; gap: 8px; cursor: pointer; text-decoration: none; }
        .logo:hover { opacity: 0.85; }
        .logo-icon { width: 32px; height: 32px; background: linear-gradient(135deg, #ef4444, #8b5cf6); border-radius: 8px; display: flex; align-items: center; justify-content: center; }
        .logo-icon i { color: white; font-size: 14px; }
        .logo-text { font-size: 20px; font-weight: 700; color: #000; }
        .logo-badge { font-size: 12px; font-weight: 600; color: #ef4444; background: rgba(239,68,68,0.15); padding: 4px 10px; border-radius: 20px; margin-left: 4px; }

        .header-right { display: flex; align-items: center; gap: 18px; }
        .user-info { display: flex; align-items: center; gap: 18px; }
        .user-name { color: #0F172A; font-size: 15px; font-weight: 500; }
        .avatar { width: 44px; height: 44px; background: linear-gradient(135deg, #ef4444, #8b5cf6); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 16px; border: 2px solid rgba(239,68,68,0.2); }
        .logout-btn { background: rgba(239,68,68,0.1); color: #ef4444; border: 1px solid rgba(239,68,68,0.4); padding: 8px 20px; border-radius: 40px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.2s; }
        .logout-btn:hover { background: rgba(239,68,68,0.2); }

        .sidebar { position: fixed; top: 114px; left: 20px; bottom: 20px; width: 280px; background: rgba(255,235,238,0.65); backdrop-filter: blur(14px); border-radius: 24px; border: 1px solid rgba(239,68,68,0.25); padding: 24px 12px; z-index: 20; }
        .menu-item { padding: 14px 18px; margin: 6px 0; border-radius: 16px; cursor: pointer; display: flex; align-items: center; gap: 14px; font-size: 15px; font-weight: 500; color: #7f1d1d; transition: all 0.25s; }
        .menu-item i { width: 22px; color: #ef4444; }
        .menu-item:hover { background: rgba(239,68,68,0.12); color: #991b1b; }
        .menu-item.active { background: linear-gradient(135deg, rgba(239,68,68,0.18), rgba(220,38,38,0.12)); color: #b91c1c; border: 1px solid rgba(239,68,68,0.4); }

        .main-content { margin-left: 320px; margin-top: 114px; padding: 10px 30px 40px; position: relative; z-index: 10; }
        .view-container { animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 40px; }
        .stat-card { background: rgba(255,255,255,0.65); backdrop-filter: blur(8px); border-radius: 26px; padding: 24px 20px; border: 1px solid rgba(239,68,68,0.2); transition: transform 0.2s, border-color 0.2s; }
        .stat-card:hover { transform: translateY(-4px); border-color: #ef4444; box-shadow: 0 6px 18px rgba(239,68,68,0.1); }
        .stat-label { font-size: 15px; color: #4B5563; margin-bottom: 12px; font-weight: 500; }
        .stat-value { font-size: 42px; font-weight: 800; background: linear-gradient(135deg, #dc2626, #ef4444); -webkit-background-clip: text; background-clip: text; color: transparent; }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .section-title { font-size: 24px; font-weight: 700; color: #0F172A; }

        .tabs { display: flex; gap: 12px; margin-bottom: 28px; border-bottom: 1px solid rgba(239,68,68,0.15); padding-bottom: 8px; flex-wrap: wrap; }
        .tab { padding: 10px 24px; background: transparent; border: none; color: #64748b; font-size: 14px; font-weight: 500; cursor: pointer; border-radius: 40px; transition: all 0.3s; }
        .tab:hover { background: rgba(239,68,68,0.08); color: #0F172A; }
        .tab.active { background: rgba(239,68,68,0.15); color: #ef4444; }
        .tab-content, .company-tab-content, .inner-tab-content { display: none; }
        .tab-content.active, .company-tab-content.active, .inner-tab-content.active { display: block; animation: fadeIn 0.3s ease; }

        .table-container { background: rgba(255,255,255,0.65); backdrop-filter: blur(8px); border-radius: 28px; border: 1px solid rgba(239,68,68,0.2); overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 700px; }
        th { text-align: left; padding: 18px 22px; background: rgba(239,68,68,0.05); font-size: 13px; font-weight: 600; color: #4B5563; border-bottom: 1px solid rgba(239,68,68,0.15); text-transform: uppercase; letter-spacing: 0.5px; }
        td { padding: 18px 22px; font-size: 15px; color: #0F172A; border-bottom: 1px solid rgba(239,68,68,0.1); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: rgba(239,68,68,0.03); }

        .status-badge { display: inline-block; padding: 5px 16px; border-radius: 40px; font-size: 13px; font-weight: 600; }
        .status-pending { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }
        .status-verified { background: #DCFCE7; color: #166534; border: 1px solid #86EFAC; }
        .status-rejected { background: #FEE2E2; color: #991B1B; border: 1px solid #FECACA; }
        .status-approved { background: #DBEAFE; color: #1E40AF; border: 1px solid #93C5FD; }
        .status-active { background: #DBEAFE; color: #1E40AF; border: 1px solid #93C5FD; }
        .status-in_progress { background: #E0E7FF; color: #3730A3; border: 1px solid #A5B4FC; }
        .status-evaluation_submitted { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }
        .status-completed { background: #DCFCE7; color: #166534; border: 1px solid #86EFAC; }
        .status-pending_verification { background: #FEF3C7; color: #92400E; border: 1px solid #FCD34D; }

        .btn-approve { background: rgba(34,197,94,0.15); color: #166534; border: 1px solid rgba(34,197,94,0.4); padding: 6px 16px; border-radius: 40px; font-size: 12px; cursor: pointer; margin-right: 8px; transition: all 0.2s; }
        .btn-approve:hover { background: rgba(34,197,94,0.3); }
        .btn-reject { background: rgba(239,68,68,0.15); color: #991B1B; border: 1px solid rgba(239,68,68,0.4); padding: 6px 16px; border-radius: 40px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .btn-reject:hover { background: rgba(239,68,68,0.3); }
        .btn-outline { background: transparent; border: 1px solid rgba(239,68,68,0.4); color: #ef4444; padding: 6px 16px; border-radius: 40px; font-size: 12px; cursor: pointer; transition: all 0.2s; }
        .btn-outline:hover { background: rgba(239,68,68,0.1); }
        .btn-primary { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; border: none; padding: 10px 20px; border-radius: 40px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 12px rgba(239,68,68,0.3); }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(239,68,68,0.5); }
        .company-detail { font-size: 12px; color: #64748b; margin-top: 4px; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); justify-content: center; align-items: center; z-index: 200; }
        .modal-content { background: rgba(255,255,255,0.9); backdrop-filter: blur(16px); border-radius: 32px; padding: 32px; width: 600px; max-width: 90%; border: 1px solid rgba(239,68,68,0.25); box-shadow: 0 20px 40px rgba(0,0,0,0.1); max-height: 80vh; overflow-y: auto; }
        .modal-content h3 { color: #0F172A; font-size: 24px; margin-bottom: 20px; }
        .company-info-detail { background: rgba(255,255,255,0.6); border-radius: 16px; padding: 16px; margin: 16px 0; }
        .evaluation-preview { background: rgba(248,250,252,0.9); border-radius: 16px; padding: 16px; margin: 16px 0; }
        .contract-preview { background: rgba(248,250,252,0.9); border-radius: 16px; padding: 20px; margin: 20px 0; font-family: monospace; font-size: 12px; color: #0F172A; white-space: pre-line; max-height: 300px; overflow-y: auto; }

        .empty-state { text-align: center; padding: 60px; color: #64748b; }
        .empty-state i { font-size: 40px; margin-bottom: 12px; opacity: 0.5; }

        .back-btn { display: inline-flex; align-items: center; gap: 8px; padding: 10px 20px; background: transparent; color: #4B5563; border: 1px solid rgba(239,68,68,0.3); border-radius: 40px; cursor: pointer; margin-bottom: 24px; transition: 0.2s; font-size: 14px; font-weight: 500; }
        .back-btn:hover { background: rgba(239,68,68,0.05); color: #0F172A; }

        .file-upload-label { cursor: pointer; display: inline-flex; align-items: center; gap: 8px; }
        .file-upload-label input { display: none; }

        /* Custom scrollbar for modals and tables */
        .modal-content::-webkit-scrollbar, .table-container::-webkit-scrollbar { width: 8px; height: 8px; }
        .modal-content::-webkit-scrollbar-track, .table-container::-webkit-scrollbar-track { background: rgba(239,68,68,0.05); border-radius: 10px; }
        .modal-content::-webkit-scrollbar-thumb, .table-container::-webkit-scrollbar-thumb { background: linear-gradient(135deg, #ef4444, #dc2626); border-radius: 10px; border: 2px solid rgba(255,255,255,0.9); }
        .modal-content::-webkit-scrollbar-thumb:hover, .table-container::-webkit-scrollbar-thumb:hover { background: #b91c1c; }
    </style>
</head>
<body>
<div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>

<header class="header">
    <div class="logo" onclick="goHome()" title="Go to Home">
        <div class="logo-icon"><i class="fas fa-briefcase"></i></div>
        <span class="logo-text">Internship Platform</span>
        <span class="logo-badge">Department</span>
    </div>
    <div class="header-right">
        <div class="user-info">
            <span class="user-name" id="adminName">Department Admin</span>
            <div class="avatar">DA</div>
            <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt mr-1"></i> Logout</button>
        </div>
    </div>
</header>

<aside class="sidebar">
    <div class="menu-item active" data-view="dashboard"><i class="fas fa-chart-pie"></i> Dashboard</div>
    <div class="menu-item" data-view="companies"><i class="fas fa-building"></i> Company Verifications</div>
    <div class="menu-item" data-view="validations"><i class="fas fa-clipboard-check"></i> Internship Validations</div>
    <div class="menu-item" data-view="documents"><i class="fas fa-file-contract"></i> Generate Documents</div>
    <div class="menu-item" data-view="students"><i class="fas fa-users"></i> Students Management</div>
</aside>

<main class="main-content" id="mainContent"></main>

<!-- Company details modal -->
<div id="companyModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-building mr-2" style="color:#ef4444;"></i>Company Details</h3>
        <div id="companyDetails" class="company-info-detail"></div>
        <div style="display:flex;gap:12px;">
            <button id="verifyCompanyBtn" class="btn-approve" style="flex:1"><i class="fas fa-check mr-1"></i> Accept</button>
            <button id="rejectCompanyBtn" class="btn-reject" style="flex:1"><i class="fas fa-times mr-1"></i> Reject</button>
            <button onclick="closeModal('companyModal')" class="btn-outline">Close</button>
        </div>
    </div>
</div>

<!-- Contract modal -->
<div id="contractModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-file-contract mr-2" style="color:#ef4444;"></i>Internship Agreement</h3>
        <div id="contractPreview" class="contract-preview"></div>
        <div style="display:flex;gap:12px;margin-top:20px;">
            <button class="btn-approve" onclick="downloadContractPdf()" style="flex:1"><i class="fas fa-file-pdf mr-1"></i> Download PDF</button>
            <button onclick="closeModal('contractModal')" class="btn-outline">Close</button>
        </div>
    </div>
</div>

<!-- Finalize internship modal (shows evaluation) -->
<div id="finalizeModal" class="modal">
    <div class="modal-content">
        <h3><i class="fas fa-clipboard-check mr-2" style="color:#ef4444;"></i>Finalize Internship</h3>
        <div id="finalizeDetails" class="evaluation-preview"></div>
        <div style="display:flex;gap:12px;margin-top:20px;">
            <button class="btn-approve" onclick="finalizeInternship()" style="flex:1"><i class="fas fa-check-double mr-1"></i> Sign & Complete</button>
            <button class="btn-outline" onclick="closeModal('finalizeModal')">Cancel</button>
        </div>
    </div>
</div>

<script>
    // ==================== DATA SERVICE LAYER ====================
    let currentCompanyId = null;
    let currentContract = null;
    let currentFinalizeAppId = null;
    let currentView = 'dashboard';

    const defaultCompanies = [
        { id: 'c1', companyName: 'Tech Solutions DZ', email: 'tech@techsolutions.dz', registrationNumber: 'RC-12345', phone: '+213 555 111 222', sector: 'Software & AI', employeeCount: '50-100', address: 'Algiers, Algeria', website: 'www.techsolutions.dz', description: 'Leading software development company.', registeredDate: '2026-04-01', status: 'pending_verification' },
        { id: 'c2', companyName: 'Digital Innovators', email: 'info@digitalinnovators.dz', registrationNumber: 'RC-67890', phone: '+213 555 333 444', sector: 'Digital Marketing', employeeCount: '10-50', address: 'Oran, Algeria', website: 'www.digitalinnovators.dz', description: 'Digital marketing agency.', registeredDate: '2026-04-05', status: 'verified', verifiedDate: '2026-04-10' },
        { id: 'c3', companyName: 'Cloud Systems DZ', email: 'cloud@cloudsystems.dz', registrationNumber: 'RC-11223', phone: '+213 555 555 666', sector: 'Cloud Computing', employeeCount: '100+', address: 'Constantine, Algeria', website: 'www.cloudsystems.dz', description: 'Cloud infrastructure provider.', registeredDate: '2026-04-08', status: 'pending_verification' }
    ];

    const defaultApplications = [
        { id: '5001', studentName: 'Ahmed Benali', company: 'Tech Solutions DZ', internshipTitle: 'Frontend Developer Intern', date: '2026-04-10', status: 'pending' },
        { id: '5002', studentName: 'Lina Mansouri', company: 'AI Analytics Pro', internshipTitle: 'Data Science Intern', date: '2026-04-12', status: 'pending' },
        { id: '5003', studentName: 'Ahmed Benali', company: 'Digital Innovators', internshipTitle: 'Digital Marketing Intern', date: '2026-04-08', status: 'approved' },
        { id: '5004', studentName: 'Karim Said', company: 'Tech Solutions DZ', internshipTitle: 'Backend Developer Intern', date: '2026-05-01', status: 'evaluation_submitted', evaluation: { punctuality: 5, quality: 4, teamwork: 4, comments: 'Excellent work, very proactive.' } }
    ];

    const defaultStudents = [
        { firstName: 'Ahmed', lastName: 'Benali', email: 'ahmed@univ-tebessa.dz', degree: 'Bachelor', specialization: 'Computer Science', registeredDate: '2026-03-01' },
        { firstName: 'Lina', lastName: 'Mansouri', email: 'lina@univ-tebessa.dz', degree: 'Master', specialization: 'Software Engineering', registeredDate: '2026-03-10' },
        { firstName: 'Karim', lastName: 'Said', email: 'karim@univ-tebessa.dz', degree: 'Bachelor', specialization: 'Information Technology', registeredDate: '2026-03-15' }
    ];

    function loadCompanies() { return JSON.parse(localStorage.getItem('registeredCompanies')) || defaultCompanies; }
    function saveCompanies(companies) { localStorage.setItem('registeredCompanies', JSON.stringify(companies)); }
    function loadApplications() { return JSON.parse(localStorage.getItem('applications')) || defaultApplications; }
    function saveApplications(apps) { localStorage.setItem('applications', JSON.stringify(apps)); }
    function loadStudents() { return JSON.parse(localStorage.getItem('registeredStudents')) || defaultStudents; }

    function renderView(view) {
        currentView = view;
        const container = document.getElementById('mainContent');
        document.querySelectorAll('.menu-item').forEach(item => item.classList.toggle('active', item.dataset.view === view));

        switch(view) {
            case 'dashboard': renderDashboard(container); break;
            case 'companies': renderCompaniesView(container); break;
            case 'validations': renderValidationsView(container); break;
            case 'documents': renderDocumentsView(container); break;
            case 'students': renderStudentsView(container); break;
            default: renderDashboard(container);
        }

        if (view !== 'dashboard') {
            const viewContainer = container.querySelector('.view-container');
            if (viewContainer && !viewContainer.querySelector('.back-btn')) {
                viewContainer.insertAdjacentHTML('afterbegin',
                    '<button class="back-btn" onclick="renderView(\'dashboard\')"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>'
                );
            }
        }
    }

    function renderDashboard(container) {
        const companies = loadCompanies();
        const pendingCompanies = companies.filter(c => c.status === 'pending_verification');
        const apps = loadApplications();
        const pendingApps = apps.filter(a => a.status === 'pending');
        const evalReview = apps.filter(a => a.status === 'evaluation_submitted');
        const students = loadStudents();

        container.innerHTML = `
        <div class="view-container">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-label"><i class="fas fa-building mr-1" style="color:#ef4444;"></i> Total Companies</div><div class="stat-value">${companies.length}</div></div>
                <div class="stat-card"><div class="stat-label"><i class="fas fa-clock mr-1"></i> Pending Verifications</div><div class="stat-value">${pendingCompanies.length}</div></div>
                <div class="stat-card"><div class="stat-label"><i class="fas fa-clipboard-list mr-1"></i> Pending Internships</div><div class="stat-value">${pendingApps.length}</div></div>
                <div class="stat-card"><div class="stat-label"><i class="fas fa-check-double mr-1"></i> Eval. Review</div><div class="stat-value">${evalReview.length}</div></div>
            </div>

            <div class="section-header">
                <h2 class="section-title"><i class="fas fa-exclamation-triangle mr-2" style="color:#ef4444;"></i> Pending Company Verifications</h2>
                <button class="btn-outline" onclick="renderView('companies')">View All</button>
            </div>
            <div class="table-container">${renderPendingCompaniesTable(pendingCompanies)}</div>

            <div class="section-header" style="margin-top:40px;">
                <h2 class="section-title"><i class="fas fa-history mr-2"></i> Recent Activity</h2>
            </div>
            <div class="table-container">${renderActivityTable()}</div>
        </div>`;
    }

    function renderPendingCompaniesTable(pending) {
        if (!pending.length) return '<div class="empty-state"><i class="fas fa-check-circle"></i><p>No pending company verifications</p></div>';
        let html = '<table><thead><tr><th>Company</th><th>Email</th><th>Sector</th><th>Address</th><th>Registered</th><th>Action</th></tr></thead><tbody>';
        pending.forEach(c => {
            html += `<tr>
                <td><strong>${c.companyName}</strong></td>
                <td>${c.email}</td>
                <td>${c.sector || 'N/A'}</td>
                <td>${c.address || 'N/A'}</td>
                <td>${new Date(c.registeredDate).toLocaleDateString()}</td>
                <td><button class="btn-outline" onclick="viewCompanyDetails('${c.id}')"><i class="fas fa-eye mr-1"></i> Review</button></td>
            </tr>`;
        });
        html += '</tbody></table>';
        return html;
    }

    function renderActivityTable() {
        const companies = loadCompanies();
        const apps = loadApplications();
        const activities = [];
        companies.forEach(c => activities.push({ type: 'company', name: c.companyName, action: 'registered', date: c.registeredDate, status: c.status }));
        apps.forEach(a => activities.push({ type: 'application', name: a.studentName, action: `applied for ${a.internshipTitle}`, date: a.date, status: a.status }));
        activities.sort((a,b) => new Date(b.date) - new Date(a.date));
        const recent = activities.slice(0,10);
        if (!recent.length) return '<div class="empty-state"><i class="fas fa-inbox"></i><p>No recent activity</p></div>';
        let html = '<table><thead><tr><th>Date</th><th>Activity</th><th>Status</th></tr></thead><tbody>';
        recent.forEach(act => {
            const statusMap = {
                'pending_verification': 'status-pending', 'verified': 'status-verified', 'rejected': 'status-rejected',
                'pending': 'status-pending', 'approved': 'status-approved', 'completed': 'status-completed',
                'evaluation_submitted': 'status-evaluation_submitted'
            };
            const badge = statusMap[act.status] || 'status-pending';
            const label = act.status.replace(/_/g, ' ');

    // ==================== EXCEL IMPORT (STRICT) ====================
    window.handleExcelImport = function(event) {
        const file = event.target.files[0];
        if (!file) return;

        const allowedExtensions = ['.xlsx', '.xls', '.csv'];
        const fileName = file.name.toLowerCase();
        const isValidExtension = allowedExtensions.some(ext => fileName.endsWith(ext));
        
        if (!isValidExtension) {
            alert('❌ Invalid file type. Please select an Excel file (.xlsx, .xls) or CSV file (.csv) only.');
            event.target.value = '';
            return;
        }

        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, { type: 'array' });
                const firstSheet = workbook.SheetNames[0];
                const worksheet = workbook.Sheets[firstSheet];
                const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1 });

                if (jsonData.length < 2) {
                    alert('⚠️ The Excel file is empty or has no data rows.');
                    return;
                }

                const headers = jsonData[0].map(h => (h || '').toString().trim().toLowerCase());
                
                const nameIdx = headers.findIndex(h => h.includes('student') && h.includes('name'));
                const companyIdx = headers.findIndex(h => h === 'company' || h.includes('company'));
                const titleIdx = headers.findIndex(h => h.includes('internship') || h.includes('title') || h.includes('position'));

                if (nameIdx === -1 || companyIdx === -1 || titleIdx === -1) {
                    alert('❌ The Excel file must contain columns for: StudentName, Company, InternshipTitle.\n\nFound columns: ' + headers.join(', '));
                    return;
                }

                const newApps = [];
                let skippedCount = 0;

                for (let i = 1; i < jsonData.length; i++) {
                    const row = jsonData[i];
                    if (!row || row.length === 0) { skippedCount++; continue; }
                    
                    const studentName = (row[nameIdx] || '').toString().trim();
                    const company = (row[companyIdx] || '').toString().trim();
                    const internshipTitle = (row[titleIdx] || '').toString().trim();

                    if (!studentName || !company || !internshipTitle) { skippedCount++; continue; }
                    
                    const irrelevantKeywords = ['total', 'summary', 'notes', 'note', 'footer', 'page', 'date:', 'prepared by'];
                    const combinedText = (studentName + company + internshipTitle).toLowerCase();
                    if (irrelevantKeywords.some(kw => combinedText.includes(kw))) { skippedCount++; continue; }

                    if (studentName.length < 3) { skippedCount++; continue; }

                    newApps.push({
                        id: 'imp' + Date.now() + '_' + i,
                        studentName: studentName,
                        company: company,
                        internshipTitle: internshipTitle,
                        date: new Date().toISOString().slice(0, 10),
                        status: 'pending'
                    });
                }

                if (newApps.length === 0) {
                    alert('⚠️ No valid internship data found in the file. ' + (skippedCount > 0 ? `(${skippedCount} rows skipped as irrelevant)` : '') + '\n\nMake sure your Excel has these columns:\n- StudentName\n- Company\n- InternshipTitle');
                    return;
                }

                const existing = loadApplications();
                saveApplications(existing.concat(newApps));
                alert(`✅ Successfully imported ${newApps.length} internship application(s).` + (skippedCount > 0 ? `\n(${skippedCount} rows skipped as irrelevant)` : ''));
                renderView('validations');
            } catch (error) {
                alert('❌ Error reading the file: ' + error.message + '\n\nMake sure it is a valid Excel or CSV file.');
            }
        };
        reader.readAsArrayBuffer(file);
        event.target.value = '';
    };
